<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <title>Infinite Notes</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Notes">
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0a0a0a">

    <link id="pwa-manifest" rel="manifest" href="">
    <link id="pwa-icon" rel="apple-touch-icon" href="">

    <!-- Explicitly Loaded for Offline PWA Caching -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* --- CORE THEME & EXPRESSIVE TYPOGRAPHY --- */
        :root {
            --bg-color: #ffffff;
            --bg-color-transparent: rgba(255, 255, 255, 0.85);
            --text-color: #000000;
            --muted-text: #888888;
            --neon-purple: #a855f7;
            --neon-green: #10b981;
            --baritone-bg: #f2f2f2;
            --baritone-text: #333333;
            --font-main: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Inter", sans-serif;
            --font-mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0a0a0a;
                --bg-color-transparent: rgba(10, 10, 10, 0.85);
                --text-color: #f0f0f0;
                --muted-text: #666666;
                --baritone-bg: #151515;
                --baritone-text: #cccccc;
            }
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color); color: var(--text-color);
            font-family: var(--font-main); margin: 0; padding: 0; width: 100vw;
            overflow-x: hidden; overscroll-behavior-y: none;
        }

        .app-container {
            max-width: 680px; width: 100%; margin: 0 auto;
            padding: 0 24px 60vh 24px; position: relative;
        }

        /* --- THE HEADER --- */
        #header-container {
            position: relative; width: 100%; min-height: 24vh;
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 6vh 24px 24px 24px; z-index: 100;
        }

        .header-max-width { max-width: 632px; margin: 0 auto; width: 100%; position: relative; z-index: 2; }

        #date-header {
            text-align: left; font-size: clamp(40px, 14vw, 110px); font-weight: 900;
            font-style: italic; text-transform: uppercase; letter-spacing: -0.05em;
            line-height: 0.9; color: var(--text-color); margin: 0 0 10px -2px;
            cursor: pointer; transition: opacity 0.2s; user-select: none; display: inline-block;
        }
        #date-header:active { opacity: 0.5; }

        .status-row { display: flex; align-items: center; gap: 16px; user-select: none; flex-wrap: wrap; }
        .neon-status { font-family: var(--font-mono); font-size: 12px; font-weight: 700; letter-spacing: 0.05em; text-transform: lowercase; }
        
        .ai-status { color: var(--neon-purple); opacity: 0.8; transition: opacity 0.3s ease; cursor: pointer; }
        .ai-status.loading { animation: neon-pulse 1.5s infinite ease-in-out; }
        .ai-status.error { color: #ef4444; opacity: 1; }

        .db-status { color: var(--neon-green); opacity: 0.8; transition: all 0.3s ease; }
        .db-status.saving { opacity: 1; text-shadow: 0 0 8px rgba(16, 185, 129, 0.4); }
        .db-status.error { color: #ef4444; opacity: 1; text-shadow: none; }

        @keyframes neon-pulse {
            0%, 100% { opacity: 0.8; text-shadow: 0 0 8px rgba(168, 85, 247, 0.4); }
            50% { opacity: 0.3; text-shadow: none; }
        }

        /* --- EXPRESSIVE TEXT BLOCKS --- */
        #lean-editor { position: relative; display: flex; flex-direction: column; gap: 2px; width: 100%; margin-top: 16px; counter-reset: lean-ol; }
        .stream-block { position: relative; width: 100%; transition: opacity 0.2s; }
        .stream-block:not(:has(.ol)) { counter-reset: lean-ol; }

        .text-content {
            font-size: clamp(18px, 4.5vw, 22px); font-weight: 500; letter-spacing: -0.02em;
            line-height: 1.5; color: var(--text-color); outline: none; min-height: 1.5em;
            word-wrap: break-word; padding: 4px 0; width: 100%; position: relative;
        }

        .text-content[data-placeholder]:empty:before {
            content: attr(data-placeholder); color: var(--muted-text);
            font-style: italic; font-weight: 400; opacity: 0.5; pointer-events: none;
        }

        /* Block Type Styles */
        .text-content.h1 { font-size: clamp(36px, 8vw, 48px); font-weight: 900; letter-spacing: -0.04em; line-height: 1.1; margin: 36px 0 8px 0; text-transform: uppercase; padding: 0; }
        .text-content.h2 { font-size: clamp(28px, 6vw, 36px); font-weight: 800; letter-spacing: -0.03em; line-height: 1.2; margin: 28px 0 6px 0; padding: 0; }
        .text-content.h3 { font-size: clamp(22px, 5vw, 28px); font-weight: 700; letter-spacing: -0.02em; line-height: 1.3; margin: 20px 0 4px 0; padding: 0; }
        .text-content.quote { font-size: clamp(20px, 5vw, 26px); font-weight: 600; letter-spacing: -0.01em; color: var(--baritone-text); background: var(--baritone-bg); border-left: 4px solid var(--text-color); padding: 16px 20px; margin: 8px 0; font-style: italic; }
        .text-content.ul, .text-content.ol, .text-content.todo, .text-content.todo-checked { padding-left: 32px; margin: 4px 0; }
        
        .stream-block:has(.ul)::after { content: '—'; position: absolute; left: 0; top: 4px; color: var(--text-color); font-weight: 900; pointer-events: none; }
        .stream-block:has(.ol) { counter-increment: lean-ol; }
        .stream-block:has(.ol)::after { content: counter(lean-ol) "."; position: absolute; left: 0; top: 4px; font-family: var(--font-mono); font-weight: 700; color: var(--text-color); font-size: 0.9em; pointer-events: none; }

        /* CHECKBOXES */
        .stream-block:has(.todo)::after, .stream-block:has(.todo-checked)::after { position: absolute; left: 4px; top: 8px; width: 16px; height: 16px; border-radius: 3px; cursor: pointer; pointer-events: none; }
        .stream-block:has(.todo)::after { content: ''; border: 2px solid var(--muted-text); }
        .stream-block:has(.todo-checked)::after { content: '✔'; background: var(--text-color); color: var(--bg-color); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; }
        .stream-block:has(.todo-checked) .text-content { text-decoration: line-through; color: var(--muted-text); opacity: 0.8; }

        /* DIVIDER */
        .text-content.hr { border-bottom: 2px solid var(--baritone-bg); margin: 24px 0; padding: 0; min-height: 0; height: 0; font-size: 0; }
        .text-content.hr:empty:before { display: none; }

        /* AI RESPONSE BLOCKS */
        .stream-block[class*="-ai"] .text-content { font-weight: 400; color: var(--neon-purple); }
        .stream-block[class*="-ai"]::before { content: ''; position: absolute; left: -16px; top: 10px; bottom: 10px; width: 3px; background: var(--neon-purple); opacity: 0.5; }

        /* --- MENUS --- */
        .floating-menu { position: absolute; background: var(--bg-color); border: 2px solid var(--text-color); box-shadow: 6px 6px 0 rgba(0, 0, 0, 0.15); z-index: 1000; display: none; flex-direction: column; width: 260px; border-radius: 4px; overflow: hidden; padding: 8px 0; transition: opacity 0.1s; }
        .floating-menu.active { display: flex; }
        .menu-item { padding: 10px 16px; font-family: var(--font-mono); font-size: 13px; font-weight: 700; text-transform: uppercase; cursor: pointer; color: var(--text-color); background: transparent; border: none; text-align: left; display: flex; justify-content: space-between; align-items: center; }
        .menu-item .sub { color: var(--muted-text); font-size: 10px; font-weight: 500; }
        .menu-item.selected, .menu-item:hover { background: var(--text-color); color: var(--bg-color); }
        .menu-item.selected .sub, .menu-item:hover .sub { color: var(--bg-color); opacity: 0.7; }
        .menu-item.create-new { color: #3b82f6; border-top: 1px solid var(--baritone-bg); }
        .menu-item.create-new.selected, .menu-item.create-new:hover { background: #3b82f6; color: #fff; }

        /* --- BARITONE PANELS --- */
        .baritone-panel { background: var(--baritone-bg); border-radius: 2px; padding: 16px 20px; margin: 16px 0; display: flex; flex-direction: column; gap: 12px; width: 100%; }
        .baritone-panel.virtual-block { border: 2px dashed var(--muted-text); background: transparent; opacity: 0.95; }
        .virtual-block .panel-header { color: var(--neon-purple); }
        .panel-header { font-family: var(--font-mono); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted-text); display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; user-select: none; }
        .panel-controls { display: flex; gap: 12px; align-items: center; }
        .panel-ctrl-btn { background: none; border: none; padding: 0; color: var(--muted-text); font-size: 14px; cursor: pointer; transition: color 0.2s; display: flex; align-items: center; justify-content: center; }
        .panel-ctrl-btn:hover { color: var(--text-color); }
        .panel-ctrl-btn.delete:hover { color: #ef4444; }

        .panel-title-input { background: transparent; border: none; outline: none; color: var(--text-color); font-family: var(--font-main); font-size: 24px; font-weight: 800; letter-spacing: -0.02em; width: 100%; margin-bottom: 8px; border-bottom: 2px solid transparent; transition: border-color 0.2s; }
        .panel-title-input::placeholder { color: var(--muted-text); font-weight: 600; opacity: 0.4; }
        .panel-title-input:focus { border-bottom-color: var(--text-color); }

        .raw-input { background: transparent; border: none; outline: none; color: var(--text-color); font-family: var(--font-main); font-size: 18px; font-weight: 500; width: 100%; }
        .raw-input::placeholder { color: var(--muted-text); }
        .raw-btn { background: var(--bg-color); border: 2px solid var(--text-color); color: var(--text-color); font-family: var(--font-mono); font-size: 11px; font-weight: 800; text-transform: uppercase; cursor: pointer; transition: all 0.2s; padding: 8px 12px; border-radius: 2px; box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.15); display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .raw-btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 rgba(0, 0, 0, 0.15); }
        .raw-btn.active { background: var(--text-color); color: var(--bg-color); }
        .raw-btn.danger { color: #ef4444; border-color: #ef4444; }
        .raw-btn.danger.active { background: #ef4444; border-color: #ef4444; color: #fff; }

        .voice-status-text { font-family: var(--font-mono); font-size: 11px; color: var(--muted-text); }
        .scan-output { font-family: var(--font-mono); font-size: 14px; min-height: 80px; resize: none; line-height: 1.5; color: var(--baritone-text); }
        .calendar-date-display { font-family: var(--font-mono); font-size: 15px; color: var(--neon-purple); font-weight: 700; display: inline-block; transition: opacity 0.2s; margin-bottom: 4px; cursor: pointer; }
        .calendar-date-display:hover { opacity: 0.8; }

        /* --- SMART CANVAS --- */
        .smart-canvas-selector { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 8px; justify-content: center; }
        .smart-canvas-option { flex: 1; min-width: 100px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; padding: 24px 16px; background: transparent; border: 2px dashed var(--muted-text); border-radius: 2px; color: var(--text-color); font-family: var(--font-mono); font-size: 13px; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
        .smart-canvas-option:hover { border-color: var(--text-color); border-style: solid; background: var(--text-color); color: var(--bg-color); }
        .canvas-relative-frame.full-bleed { position: relative; margin-left: -20px; width: calc(100% + 40px); max-width: none; border-radius: 0; overflow: hidden; margin-top: 8px; height: 60vh; min-height: 400px; }
        .leaflet-container { background: var(--bg-color) !important; width: 100%; height: 100% !important; z-index: 1; position: absolute; top: 0; left: 0; }
        .leaflet-container.drawing-mode, .leaflet-container.drawing-mode .leaflet-interactive { cursor: crosshair !important; touch-action: none !important; }
        .leaflet-container.locked-mode { cursor: default !important; }

        /* --- PERSONA MENTIONS --- */
        .persona-mention { color: #3b82f6; font-weight: 700; cursor: pointer; text-decoration: none; border-bottom: 2px solid transparent; transition: border-color 0.2s, opacity 0.2s; padding: 0 1px; }
        .persona-mention:hover { border-bottom-color: currentColor; opacity: 0.8; }

        /* --- BACKLINKS SECTION --- */
        .backlinks-section { margin-bottom: 24px; padding: 16px 20px; background: var(--baritone-bg); border-radius: 2px; }
        .backlinks-header { font-family: var(--font-mono); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted-text); margin-bottom: 12px; user-select: none; }
        .backlink-item { font-family: var(--font-mono); font-size: 13px; font-weight: 600; color: #3b82f6; cursor: pointer; padding: 6px 0; border: none; background: none; text-align: left; display: flex; gap: 8px; align-items: baseline; transition: opacity 0.2s; width: 100%; }
        .backlink-item:hover { opacity: 0.7; }
        .backlink-item .backlink-preview { color: var(--muted-text); font-weight: 400; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }

        /* --- EDITORIAL CALENDAR MODAL --- */
        .editorial-cal-modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg-color-transparent); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); z-index: 10000; display: none; justify-content: center; align-items: center; padding: 20px; }
        .editorial-cal-modal.active { display: flex; }
        .cal-modal-panel { background: var(--bg-color); width: 100%; max-width: 400px; padding: 24px; display: flex; flex-direction: column; border: 2px solid var(--text-color); box-shadow: 8px 8px 0 rgba(0, 0, 0, 0.15); max-height: 90vh; overflow-y: auto; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 14px; font-weight: 700; cursor: pointer; background: var(--baritone-bg); color: var(--text-color); transition: background 0.2s, color 0.2s; }
        .cal-day:active, .cal-day.selected { background: var(--text-color); color: var(--bg-color); }
        .cal-day.muted { opacity: 0.15; pointer-events: none; }
        .time-row { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 8px; padding-bottom: 8px; scrollbar-width: none; -ms-overflow-style: none; }
        .time-row::-webkit-scrollbar { display: none; }
        .time-row .raw-btn { flex: 0 0 auto; scroll-snap-align: center; border-radius: 20px; box-shadow: 2px 2px 0 rgba(0, 0, 0, 0.15); }
        .time-row .raw-btn:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0 rgba(0, 0, 0, 0.15); }
        .whiteboard-shell { display: flex; flex-direction: column; gap: 12px; }
        .whiteboard-stage { position: relative; width: 100%; min-height: 320px; background: repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(0, 0, 0, 0.05) 28px), repeating-linear-gradient(90deg, transparent, transparent 27px, rgba(0, 0, 0, 0.05) 28px), var(--bg-color); border: 2px solid var(--text-color); overflow: hidden; touch-action: none; }
        .whiteboard-canvas { display: block; width: 100%; height: 360px; cursor: crosshair; }
        .whiteboard-readonly .whiteboard-canvas { cursor: default; }
        .image-stage { margin-top: 8px; border: 2px solid var(--text-color); background: var(--baritone-bg); overflow: hidden; }
        .image-view { display: block; width: 100%; height: auto; max-height: 70vh; object-fit: contain; }

        .ai-settings-modal { position: fixed; inset: 0; background: var(--bg-color-transparent); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); z-index: 10001; display: none; justify-content: center; align-items: center; padding: 20px; }
        .ai-settings-modal.active { display: flex; }
        .ai-settings-panel { background: var(--bg-color); width: min(100%, 520px); padding: 24px; border: 2px solid var(--text-color); box-shadow: 8px 8px 0 rgba(0, 0, 0, 0.15); display: flex; flex-direction: column; gap: 16px; max-height: 90vh; overflow-y: auto; }
        .ai-settings-copy { font-family: var(--font-mono); font-size: 11px; line-height: 1.6; color: var(--muted-text); text-transform: uppercase; }
        .ai-settings-grid { display: grid; gap: 12px; }
        .ai-settings-label { display: flex; flex-direction: column; gap: 6px; font-family: var(--font-mono); font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--muted-text); }
        .ai-settings-input, .ai-settings-select { width: 100%; background: transparent; border: 2px solid var(--text-color); color: var(--text-color); padding: 12px; font-family: var(--font-main); font-size: 16px; outline: none; }
        .ai-settings-input::placeholder { color: var(--muted-text); }
        .ai-settings-hint { font-family: var(--font-mono); font-size: 11px; line-height: 1.5; color: var(--muted-text); }
        .ai-settings-actions { display: flex; gap: 12px; flex-wrap: wrap; }
    </style>
</head>

<body>
    <!-- THE HEADER -->
    <div id="header-container">
        <div class="header-max-width">
            <div id="date-header">today</div>
            <div class="status-row">
                <span id="ai-inline-status" class="neon-status ai-status loading">sys.ai.booting</span>
                <span id="db-status" class="neon-status db-status">db.init</span>
            </div>
        </div>
    </div>

    <!-- THE LEAN EDITOR -->
    <div class="app-container">
        <div id="lean-editor"></div>
    </div>

    <!-- Editorial Calendar Overlay -->
    <div id="editorial-cal" class="editorial-cal-modal">
        <div class="cal-modal-panel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <button id="ecal-prev" class="raw-btn">&larr;</button>
                <div id="ecal-title" style="font-size: 20px; font-weight: 900; font-style: italic; text-transform: uppercase; font-family: var(--font-main);">month</div>
                <button id="ecal-next" class="raw-btn">&rarr;</button>
            </div>
            <div id="ecal-grid" class="cal-grid"></div>
            <div id="ecal-time-container" style="display: none; flex-direction: column; gap: 16px; margin-top: 24px; border-top: 2px solid var(--text-color); padding-top: 20px;">
                <div style="font-family: var(--font-mono); font-size: 10px; color: var(--muted-text); text-transform: uppercase; margin-bottom: -8px;">Time</div>
                <div class="time-row" id="ecal-hour-row"></div>
                <div class="time-row" id="ecal-minute-row"></div>
                <div style="font-family: var(--font-mono); font-size: 10px; color: var(--muted-text); text-transform: uppercase; margin-bottom: -8px; margin-top: 8px;">Recurrence</div>
                <div class="time-row" id="ecal-recurrence-row"></div>
            </div>
            <button id="ecal-close" class="raw-btn active" style="margin-top: 24px; width: 100%; padding: 12px; font-size: 14px;">CONFIRM</button>
        </div>
    </div>

    <div id="ai-settings-modal" class="ai-settings-modal">
        <div class="ai-settings-panel">
            <div style="display: flex; justify-content: space-between; align-items: center; gap: 16px;">
                <div style="font-size: 20px; font-weight: 900; font-style: italic; text-transform: uppercase; font-family: var(--font-main);">AI Routing</div>
                <button id="ai-settings-close" class="raw-btn">Close</button>
            </div>
            <div class="ai-settings-copy">Remote AI only. Keys stay in this browser via localStorage, so this is suitable for personal use or a proxy you control.</div>
            <div class="ai-settings-grid">
                <label class="ai-settings-label">
                    Provider
                    <select id="ai-provider-select" class="ai-settings-select">
                        <option value="openai">ChatGPT / OpenAI</option>
                        <option value="anthropic">Claude / Anthropic</option>
                        <option value="gemini">Gemini / Google</option>
                        <option value="openrouter">OpenRouter</option>
                        <option value="custom">OpenAI-Compatible</option>
                    </select>
                </label>
                <label class="ai-settings-label">
                    Model
                    <input id="ai-model-input" class="ai-settings-input" type="text" placeholder="gpt-4.1-mini">
                </label>
                <label class="ai-settings-label">
                    API Key
                    <input id="ai-key-input" class="ai-settings-input" type="password" placeholder="Paste API key">
                </label>
                <label id="ai-base-url-label" class="ai-settings-label" style="display: none;">
                    Base URL
                    <input id="ai-base-url-input" class="ai-settings-input" type="url" placeholder="https://api.openai.com/v1/chat/completions">
                </label>
                <div id="ai-settings-hint" class="ai-settings-hint"></div>
            </div>
            <div class="ai-settings-actions">
                <button id="ai-settings-save" class="raw-btn active">Save</button>
                <button id="ai-settings-clear" class="raw-btn">Clear Key</button>
            </div>
        </div>
    </div>

    <script type="module">
        // ============================================================================
        // ⚙️ SYSTEM UTILS & HELPERS
        // ============================================================================
        const CONFIG = { DEV_ALLOW_PAST_EDITING: true, AI_SETTINGS_KEY: 'infinotes_ai_settings_v1', EMBEDDING_MODEL_ID: 'Xenova/all-MiniLM-L6-v2' };
        const AI_PROVIDER_PRESETS = {
            openai: {
                label: 'ChatGPT / OpenAI',
                defaultModel: 'gpt-4.1-mini',
                hint: 'Uses the OpenAI chat completions streaming API directly from the browser.'
            },
            anthropic: {
                label: 'Claude / Anthropic',
                defaultModel: 'claude-3-7-sonnet-latest',
                hint: 'Uses the Anthropic messages streaming API. Browser-side keys depend on your Anthropic account policy.'
            },
            gemini: {
                label: 'Gemini / Google',
                defaultModel: 'gemini-2.5-flash',
                hint: 'Uses Google Gemini streaming via SSE with your API key appended to the request URL.'
            },
            openrouter: {
                label: 'OpenRouter',
                defaultModel: 'openai/gpt-4.1-mini',
                hint: 'Uses OpenRouter’s OpenAI-compatible streaming endpoint.'
            },
            custom: {
                label: 'OpenAI-Compatible',
                defaultModel: 'gpt-4.1-mini',
                baseUrl: 'https://api.openai.com/v1/chat/completions',
                hint: 'Use this for an OpenAI-compatible proxy or self-hosted endpoint.'
            }
        };
        const SLASH_COMMANDS = [
            { id: 'map', label: 'Map', sub: 'Pan & Zoom' },
            { id: 'image', label: 'Image', sub: 'Place & Inspect' },

        const VectorEmbedder = new (class {
            constructor() {
                this.embedder = null;
                this.promise = null;
            }
            fallbackEmbedding(text) {
                const normalized = normalizePlainText(text).toLowerCase();
                const vector = new Array(384).fill(0);
                const tokens = normalized.split(/\s+/).filter(Boolean);
                const grams = [];
                tokens.forEach(token => {
                    grams.push(token);
                    if (token.length > 2) {
                        for (let index = 0; index <= token.length - 3; index += 1) grams.push(token.slice(index, index + 3));
                    }
                });
                const parts = grams.length ? grams : [normalized];
                parts.forEach((part, partIndex) => {
                    let hash = 2166136261;
                    for (let index = 0; index < part.length; index += 1) {
                        hash ^= part.charCodeAt(index);
                        hash = Math.imul(hash, 16777619);
                    }
                    const dimension = Math.abs(hash % vector.length);
                    const sign = ((hash >>> 1) & 1) === 0 ? 1 : -1;
                    vector[dimension] += sign * (1 + (partIndex % 7) * 0.05);
                });
                const magnitude = Math.hypot(...vector) || 1;
                return vector.map(value => value / magnitude);
            }
            async getEmbedder() {
                if (this.embedder) return this.embedder;
                if (!this.promise) {
                    this.promise = import('https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0-alpha.19/+esm').then(async ({ pipeline, env }) => {
                        env.allowRemoteModels = true;
                        env.useBrowserCache = true;
                        if (env.backends?.onnx) env.backends.onnx.logLevel = 'fatal';
                        try {
                            this.embedder = await pipeline('feature-extraction', CONFIG.EMBEDDING_MODEL_ID, { device: 'webgpu' });
                        } catch {
                            this.embedder = await pipeline('feature-extraction', CONFIG.EMBEDDING_MODEL_ID, { device: 'wasm', dtype: 'q8' });
                        }
                        return this.embedder;
                    });
                }
                return this.promise;
            }
            async embedText(text) {
                const normalized = normalizePlainText(text).slice(0, 1200);
                if (!normalized) return null;
                try {
                    const pipe = await this.getEmbedder();
                    const output = await pipe(normalized, { pooling: 'mean', normalize: true });
                    const list = typeof output.tolist === 'function' ? output.tolist() : Array.from(output.data);
                    return Array.isArray(list[0]) ? list[0] : list;
                } catch {
                    return this.fallbackEmbedding(normalized);
                }
            }
        })();

        class PGLiteDatabase {
            constructor() { this.pg = null; this.cache = {}; this.isReady = false; this.vectorReady = false; this.pendingDays = new Set(); }
            async init() {
                const statusEl = document.getElementById('db-status');
                try {
                    const [{ PGlite }, { vector }] = await Promise.all([
                        import("https://cdn.jsdelivr.net/npm/@electric-sql/pglite/dist/index.js"),
                        import("https://cdn.jsdelivr.net/npm/@electric-sql/pglite/dist/vector/index.js")
                    ]);
                    this.pg = await PGlite.create({ dataDir: 'idb://infinotes-v2', extensions: { vector } });
                    await this.pg.exec(`
                        CREATE EXTENSION IF NOT EXISTS vector;
                        CREATE TABLE IF NOT EXISTS daily_notes (date_str TEXT PRIMARY KEY, data JSONB);
                        CREATE TABLE IF NOT EXISTS semantic_index (key TEXT PRIMARY KEY, date_str TEXT, block_id TEXT, block_type TEXT, search_text TEXT, embedding vector(384), timestamp BIGINT);
                        CREATE TABLE IF NOT EXISTS personas_list (slug TEXT PRIMARY KEY, display_name TEXT NOT NULL, created_at BIGINT);
                    `);
                    await this.pg.query(`INSERT INTO personas_list (slug, display_name, created_at) VALUES ('me', 'me', $1) ON CONFLICT DO NOTHING`, [Date.now()]);
                    
                    this.vectorReady = true;
                    this.isReady = true; statusEl.textContent = 'db.ready'; statusEl.className = 'neon-status db-status';
                    (await this.pg.query(`SELECT date_str, data FROM daily_notes`)).rows.forEach(r => this.cache[r.date_str] = typeof r.data === 'string' ? JSON.parse(r.data) : r.data);
                    Object.keys(this.cache).filter(dateStr => !dateStr.startsWith('persona::')).forEach(dateStr => this.pendingDays.add(dateStr));
                    this.startBackgroundIndexer();
                } catch (e) {
                    statusEl.textContent = 'db.offline [memory mode]'; statusEl.className = 'neon-status db-status error';
                }
            }
            async saveNote(dateStr, data) {
                this.cache[dateStr] = data; localStorage.setItem(`infinotes_backup_${dateStr}`, JSON.stringify(data));
                if (!this.isReady) throw new Error("Offline");
                await this.pg.query(`INSERT INTO daily_notes (date_str, data) VALUES ($1, $2) ON CONFLICT (date_str) DO UPDATE SET data = EXCLUDED.data`, [dateStr, JSON.stringify(data)]);
                if (!dateStr.startsWith('persona::')) this.pendingDays.add(dateStr);
            }
            async getPersonas() { return this.isReady ? (await this.pg.query(`SELECT slug, display_name, created_at FROM personas_list ORDER BY created_at DESC`)).rows : []; }
            async createPersona(slug, displayName) { if (this.isReady) await this.pg.query(`INSERT INTO personas_list (slug, display_name, created_at) VALUES ($1, $2, $3) ON CONFLICT (slug) DO NOTHING`, [slug, displayName, Date.now()]); }
            extractSearchText(block) {
                if (!block) return '';
                if (['text', 'h1', 'h2', 'h3', 'quote', 'ul', 'ol', 'todo', 'todo-checked'].includes(block.type)) return normalizePlainText(block.data?.text);
                return normalizePlainText(JSON.stringify(block.data));
            }
            findBacklinks(slug) {
                const res = [], search = `data-slug="${slug}"`;
                for (const [key, data] of Object.entries(this.cache)) {
                    if (key.startsWith('persona::') || !data?.blocks) continue;
                    for (const b of data.blocks) {
                        if (b.data?.text?.includes(search)) {
                            res.push({ dateStr: key, blockId: b.id, preview: decodeHTML(normalizePlainText(b.data.text)).substring(0, 80) }); break;
                        }
                    }
                }
                return res.sort((a, b) => b.dateStr.localeCompare(a.dateStr));
            }
            startBackgroundIndexer() {
                setInterval(async () => {
                    if (!this.isReady || !this.vectorReady || !this.pendingDays.size) return;
                    const dateStr = [...this.pendingDays][0];
                    this.pendingDays.delete(dateStr);
                    const dayData = this.cache[dateStr];
                    if (!dayData?.blocks) return;
                    try {
                        await this.pg.query(`DELETE FROM semantic_index WHERE date_str = $1`, [dateStr]);
                        for (const block of dayData.blocks) {
                            const searchText = this.extractSearchText(block);
                            if (!searchText) continue;
                            const embedding = await VectorEmbedder.embedText(searchText);
                            if (!embedding) continue;
                            await this.pg.query(`INSERT INTO semantic_index (key, date_str, block_id, block_type, search_text, embedding, timestamp) VALUES ($1, $2, $3, $4, $5, $6::vector, $7)`, [
                                `${dateStr}::${block.id}`,
                                dateStr,
                                block.id,
                                block.type,
                                searchText,
                                `[${embedding.join(',')}]`,
                                block.timestamp || Date.now()
                            ]);
                        }
                    } catch {
                        this.vectorReady = false;
                    }
                }, 4000);
            }
            async searchNotesLexical(queryText, excludeDate, limit = 5) {
                const normalizedQuery = normalizePlainText(queryText).toLowerCase();
                if (!normalizedQuery) return [];
                const tokens = normalizedQuery.split(/\s+/).filter(Boolean);
                const matches = [];
                for (const [dateStr, data] of Object.entries(this.cache)) {
                    if (dateStr === excludeDate || dateStr.startsWith('persona::') || !data?.blocks) continue;
                    for (const block of data.blocks) {
                        const searchText = this.extractSearchText(block);
                        if (!searchText) continue;
                        const haystack = searchText.toLowerCase();
                        const exactMatch = haystack.includes(normalizedQuery);
                        const tokenMatches = tokens.reduce((count, token) => count + (haystack.includes(token) ? 1 : 0), 0);
                        if (!exactMatch && tokenMatches === 0) continue;
                        matches.push({
                            date: dateStr,
                            blockId: block.id,
                            type: block.type,
                            searchText,
                            timestamp: block.timestamp || 0,
                            score: (exactMatch ? 100 : 0) + tokenMatches * 10 + Math.min(searchText.length, 200) / 200
                        });
                    }
                }
                return matches.sort((a, b) => b.score - a.score || b.timestamp - a.timestamp).slice(0, limit);
            }
            async searchNotes(queryText, excludeDate, limit = 5) {
                if (this.isReady && this.vectorReady) {
                    try {
                        const embedding = await VectorEmbedder.embedText(queryText);
                        if (embedding) {
                            const result = await this.pg.query(`SELECT date_str as date, block_id as "blockId", block_type as type, search_text as "searchText", timestamp, 1 - (embedding <=> $1::vector) AS score FROM semantic_index WHERE date_str != $2 ORDER BY embedding <=> $1::vector ASC LIMIT $3`, [`[${embedding.join(',')}]`, excludeDate || '', limit]);
                            if (result.rows?.length) return result.rows;
                        }
                    } catch {
                        this.vectorReady = false;
                    }
                }
                return this.searchNotesLexical(queryText, excludeDate, limit);
            }
        }

        async function readSSEStream(response, onEvent) {
            if (!response.ok) {
                let detail = '';
                try { detail = await response.text(); } catch {}
                throw new Error(detail || `HTTP ${response.status}`);
            }
            if (!response.body) throw new Error('Streaming not available in this browser');
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            while (true) {
                const { value, done } = await reader.read();
                buffer += decoder.decode(value || new Uint8Array(), { stream: !done });
                const frames = buffer.split(/\n\n/);
                buffer = frames.pop() || '';
                for (const frame of frames) {
                    const lines = frame.split(/\n/).filter(Boolean);
                    let event = 'message';
                    const dataLines = [];
                    lines.forEach(line => {
                        if (line.startsWith('event:')) event = line.slice(6).trim();
                        if (line.startsWith('data:')) dataLines.push(line.slice(5).trim());
                    });
                    if (!dataLines.length) continue;
                    const data = dataLines.join('\n');
                    await onEvent({ event, data });
                }
                if (done) break;
            }
            if (buffer.trim()) {
                const lines = buffer.split(/\n/).filter(Boolean);
                let event = 'message';
                const dataLines = [];
                lines.forEach(line => {
                    if (line.startsWith('event:')) event = line.slice(6).trim();
                    if (line.startsWith('data:')) dataLines.push(line.slice(5).trim());
                });
                if (dataLines.length) await onEvent({ event, data: dataLines.join('\n') });
            }
        }

        const AIService = {
            getSettings() {
                const settings = getStoredAISettings();
                if (!settings.apiKey) throw new Error('Remote AI is not configured yet. Click the AI status to add an API key.');
                return settings;
            },
            async streamCompletion({ systemPrompt, userPrompt, onDelta }) {
                const settings = this.getSettings();
                const messages = [{ role: 'user', content: userPrompt }];
                switch (settings.provider) {
                    case 'openai':
                    case 'openrouter':
                    case 'custom':
                        return this.streamOpenAICompatible(settings, messages, systemPrompt, onDelta);
                    case 'anthropic':
                        return this.streamAnthropic(settings, messages, systemPrompt, onDelta);
                    case 'gemini':
                        return this.streamGemini(settings, messages, systemPrompt, onDelta);
                    default:
                        throw new Error('Unsupported AI provider');
                }
            },
            async streamOpenAICompatible(settings, messages, systemPrompt, onDelta) {
                const endpoint = settings.provider === 'openrouter'
                    ? 'https://openrouter.ai/api/v1/chat/completions'
                    : settings.baseUrl || 'https://api.openai.com/v1/chat/completions';
                const headers = {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${settings.apiKey}`
                };
                if (settings.provider === 'openrouter') headers['X-Title'] = 'Infinite Notes';
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers,
                    body: JSON.stringify({
                        model: settings.model,
                        stream: true,
                        temperature: 0.7,
                        max_tokens: 500,
                        messages: [
                            { role: 'system', content: systemPrompt },
                            ...messages
                        ]
                    })
                });
                await readSSEStream(response, async ({ data }) => {
                    if (data === '[DONE]') return;
                    const payload = JSON.parse(data);
                    const delta = payload.choices?.[0]?.delta?.content;
                    if (typeof delta === 'string' && delta) onDelta(delta);
                    else if (Array.isArray(delta)) {
                        delta.forEach(part => { if (part?.type === 'text' && part.text) onDelta(part.text); });
                    }
                });
            },
            async streamAnthropic(settings, messages, systemPrompt, onDelta) {
                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': settings.apiKey,
                        'anthropic-version': '2023-06-01'
                    },
                    body: JSON.stringify({
                        model: settings.model,
                        max_tokens: 500,
                        temperature: 0.7,
                        system: systemPrompt,
                        stream: true,
                        messages
                    })
                });
                await readSSEStream(response, async ({ data }) => {
                    if (!data || data === '[DONE]') return;
                    const payload = JSON.parse(data);
                    const delta = payload.delta?.text || payload.content_block?.text || '';
                    if (delta) onDelta(delta);
                });
            },
            async streamGemini(settings, messages, systemPrompt, onDelta) {
                const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(settings.model)}:streamGenerateContent?alt=sse&key=${encodeURIComponent(settings.apiKey)}`;
                let aggregated = '';
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        systemInstruction: { parts: [{ text: systemPrompt }] },
                        contents: messages.map(message => ({
                            role: message.role === 'assistant' ? 'model' : 'user',
                            parts: [{ text: message.content }]
                        })),
                        generationConfig: { temperature: 0.7, maxOutputTokens: 500 }
                    })
                });
                await readSSEStream(response, async ({ data }) => {
                    if (!data || data === '[DONE]') return;
                    const payload = JSON.parse(data);
                    const text = (payload.candidates || [])
                        .flatMap(candidate => candidate.content?.parts || [])
                        .map(part => part.text || '')
                        .join('');
                    if (!text) return;
                    if (text.startsWith(aggregated)) {
                        const delta = text.slice(aggregated.length);
                        aggregated = text;
                        if (delta) onDelta(delta);
                    } else {
                        aggregated += text;
                        onDelta(text);
                    }
                });
            }
        };

        class FloatingMenu {
            constructor(id, container) { this.el = el('div', { id, className: 'floating-menu' }); container.appendChild(this.el); this.container = container; this.active = false; this.index = 0; }
            open(context, range, filterStr, onExecute, renderFn) {
                this.active = true; this.context = { ...context, range }; this.index = 0; this.onExecute = onExecute; this.renderFn = renderFn;
                const rect = range.getBoundingClientRect().width === 0 ? context.content.getBoundingClientRect() : range.getBoundingClientRect(), cRect = this.container.getBoundingClientRect();
                this.el.style.top = `${rect.bottom - cRect.top + this.container.scrollTop + 8}px`; this.el.style.left = `${Math.max(0, rect.left - cRect.left)}px`;
                this.update(filterStr);
            }
            close() { this.active = false; this.el.classList.remove('active'); this.context = null; }
            update(items) {
                this.items = items; this.el.innerHTML = ''; if (!items.length) return this.close();
                if (this.index >= items.length) this.index = 0;
                items.forEach((item, i) => { const btn = this.renderFn(item, i === this.index); btn.onmousedown = (e) => { e.preventDefault(); this.onExecute(item, this.context); }; this.el.appendChild(btn); });
                this.el.classList.add('active');
            }
            handleKey(e) {
                if (!this.active) return false;
                if (e.key === 'ArrowDown') { e.preventDefault(); this.index = (this.index + 1) % this.items.length; this.update(this.items); return true; }
                if (e.key === 'ArrowUp') { e.preventDefault(); this.index = (this.index - 1 + this.items.length) % this.items.length; this.update(this.items); return true; }
                if (e.key === 'Enter') { e.preventDefault(); this.onExecute(this.items[this.index], this.context); return true; }
                if (e.key === 'Escape') { e.preventDefault(); this.close(); return true; }
                return false;
            }
        }

            }
            destroy() {
                this.lineLayers = [];

            }

                    const mapping = { '# ': 'h1', '## ': 'h2', '### ': 'h3', '- ': 'ul', '* ': 'ul', '1. ': 'ol', '> ': 'quote', '[] ': 'todo', '[ ] ': 'todo', '[x] ': 'todo-checked', '[X] ': 'todo-checked', '---': 'hr' };
                    if (mapping[text]) {
                        this.replaceTextNodeType(block, mapping[text], true);
                        if (mapping[text] === 'hr') setTimeout(() => setCaret(this.addBasicBlock('text', '', 'user').dom.querySelector('.text-content')), 10);
                        return scheduleSave();
                    }
                }
                const sel = window.getSelection();
                if (sel.rangeCount > 0) {
                    const range = sel.getRangeAt(0), preCaretRange = range.cloneRange(); preCaretRange.selectNodeContents(content); preCaretRange.setEnd(range.startContainer, range.startOffset);
                    const textBeforeCursor = preCaretRange.toString();
                    const slashMatch = textBeforeCursor.match(/(?:^|\n)\/([a-zA-Z0-9_]*)$/);
                    if (slashMatch) this.openSlashMenu(block, content, slashMatch[1].toLowerCase(), range); else this.slashMenu.close();
                    const refMatch = textBeforeCursor.match(/(?:^|\s|\n)@([a-zA-Z0-9_-]*)$/);
                    if (refMatch && !this.slashMenu.active) this.openPersonaMenu(block, content, refMatch[1], range); else this.personaMenu.close();
                }
            }

            openSlashMenu(block, content, filterText, currentRange) {
                const items = SLASH_COMMANDS.filter(cmd => cmd.id.toLowerCase().includes(filterText) || cmd.label.toLowerCase().includes(filterText));
                this.slashMenu.open({ block, content }, currentRange, items, (item, ctx) => {
                    ctx.content.innerHTML = ctx.content.innerHTML.replace(/\/[a-zA-Z0-9_]*$/, '');
                    if (ctx.content.innerHTML === '<br>') ctx.content.innerHTML = '';
                    const isEmpty = ctx.content.textContent.trim() === '';
                    this.addToolBlock(item.id, {}, 'user', crypto.randomUUID(), Date.now());
                    if (isEmpty) this.deleteBlock(ctx.block.id);
                    this.slashMenu.close();
                }, (item, isSelected) => el('button', { className: `menu-item ${isSelected ? 'selected' : ''}` }, el('span', { textContent: item.label }), el('span', { className: 'sub', textContent: item.sub })));
            }

            async openPersonaMenu(block, content, filterText, currentRange) {
                const filterLower = filterText.toLowerCase().trim();
                if (!this.cachedPersonas) {
                    const personas = await pgDB.getPersonas(), activePersonas = [];
                    for (const persona of personas) {
                        const personaData = pgDB.cache[`persona::${persona.slug}`];
                        if (pgDB.findBacklinks(persona.slug).length > 0 || (personaData?.blocks?.length > 0 && !(personaData.blocks.length === 1 && !personaData.blocks[0].data.text)) || persona.slug === 'me') activePersonas.push(persona);
                        else await pgDB.pg.query(`DELETE FROM personas_list WHERE slug = $1`, [persona.slug]);
                    }
                    this.cachedPersonas = activePersonas;
                }

                const filtered = filterLower ? this.cachedPersonas.filter(r => r.display_name.toLowerCase().includes(filterLower) || r.slug.includes(filterLower)) : this.cachedPersonas;
                let items = filtered.map(r => ({ slug: r.slug, name: r.display_name, isNew: false }));
                if (filterLower && !this.cachedPersonas.some(r => r.display_name.toLowerCase() === filterLower)) items.push({ slug: null, name: filterText.trim(), isNew: true });
                if (items.length === 0 && !filterLower) return;

                this.personaMenu.open({ block, content }, currentRange, items, async (item, ctx) => {
                    let { slug, name } = item;
                    if (item.isNew) { slug = name.toLowerCase().replace(/[^a-z0-9_-]+/g, '-').replace(/^-|-$/g, '') || 'persona-' + Date.now(); await pgDB.createPersona(slug, name); this.cachedPersonas = null; }
                    
                    const sel = window.getSelection();
                    if (sel.rangeCount > 0) {
                        const range = sel.getRangeAt(0), preCaretRange = range.cloneRange(); preCaretRange.selectNodeContents(ctx.content); preCaretRange.setEnd(range.startContainer, range.startOffset);
                        const atIdx = preCaretRange.toString().lastIndexOf('@');
                        if (atIdx >= 0) {
                            const walker = document.createTreeWalker(ctx.content, NodeFilter.SHOW_TEXT, null, false);
                            let charCount = 0, startNode = null, startOffset = 0;
                            while (walker.nextNode()) { const len = walker.currentNode.textContent.length; if (!startNode && charCount + len > atIdx) { startNode = walker.currentNode; startOffset = atIdx - charCount; } charCount += len; }
                            if (startNode) {
                                const deleteRange = document.createRange(); deleteRange.setStart(startNode, startOffset); deleteRange.setEnd(range.startContainer, range.startOffset); deleteRange.deleteContents();
                                const spaceAfter = document.createTextNode('\u00A0'); deleteRange.insertNode(spaceAfter); deleteRange.insertNode(el('span', { className: 'persona-mention', 'data-slug': slug, contentEditable: 'false', textContent: `@${name.toUpperCase()}` }));
                                const newRange = document.createRange(); newRange.setStartAfter(spaceAfter); newRange.collapse(true); sel.removeAllRanges(); sel.addRange(newRange);
                            }
                        }
                    }
                    this.personaMenu.close(); scheduleSave();
                }, (item, isSelected) => el('button', { className: `menu-item ${item.isNew ? 'create-new' : ''} ${isSelected ? 'selected' : ''}` }, el('span', { textContent: item.isNew ? `+ ${item.name.toUpperCase()}` : item.name.toUpperCase() }), el('span', { className: 'sub', textContent: item.isNew ? 'create persona' : 'persona' })));
            }

            handleTextKeydown(e, block, content) {
                if (this.slashMenu.handleKey(e) || this.personaMenu.handleKey(e)) return;

                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    if (['ul', 'ol', 'quote', 'todo', 'todo-checked'].includes(block.type) && content.textContent.trim() === '') return this.replaceTextNodeType(block, 'text'), scheduleSave();
                    
                    const sel = window.getSelection();
                    if (sel.rangeCount > 0) {
                        const range = sel.getRangeAt(0), postCaretRange = range.cloneRange(); postCaretRange.selectNodeContents(content); postCaretRange.setStart(range.endContainer, range.endOffset);
                        const tempDiv = document.createElement('div'); tempDiv.appendChild(postCaretRange.extractContents());
                        let postHtml = tempDiv.innerHTML === '<br>' ? '' : tempDiv.innerHTML;
                        if (content.innerHTML.endsWith('<br>')) content.innerHTML = content.innerHTML.slice(0, -4);
                        
                        this.activeBlockId = block.id; 
                        const newBlock = this.addBasicBlock(['ul', 'ol', 'quote'].includes(block.type) ? block.type : ['todo', 'todo-checked'].includes(block.type) ? 'todo' : 'text', postHtml, 'user');

                        // --- AI COLLAB DETECTION PIPELINE ---
                        const aiMentions = [];
                        // 1. Cleanly convert plaintext rapid typing to proper tags
                        content.innerHTML = content.innerHTML.replace(/@([a-zA-Z0-9_-]+)\.collab/gi, (match, p1) => {
                            const slug = p1.toLowerCase(); pgDB.createPersona(slug, p1.toUpperCase()); this.cachedPersonas = null; aiMentions.push({ slug, name: p1.toUpperCase() });
                            return `<span class="persona-mention" data-slug="${slug}">@${p1.toUpperCase()}</span>`;
                        });
                        // 2. Identify existing tags adjacent to .collab text
                        Array.from(content.querySelectorAll('.persona-mention')).forEach(m => {
                            let next = m.nextSibling;
                            if (next && next.nodeType === Node.TEXT_NODE && /^\s*\.collab/i.test(next.textContent)) {
                                aiMentions.push({ slug: m.getAttribute('data-slug'), name: m.textContent.replace('@', '') });
                                next.textContent = next.textContent.replace(/^\s*\.collab/i, '');
                            }
                        });

                        if (aiMentions.length > 0) this.triggerAIPersonas(block, content, aiMentions);
                        // ------------------------------------
                        setTimeout(() => setCaret(newBlock.dom.querySelector('.text-content'), 0), 10); scheduleSave();
                    }
                    return;
                }

                if (e.key === 'Backspace') {
                    const sel = window.getSelection();
                    if (sel.rangeCount > 0) {
                        const range = sel.getRangeAt(0), preCaretRange = range.cloneRange(); preCaretRange.selectNodeContents(content); preCaretRange.setEnd(range.startContainer, range.startOffset);
                        if (preCaretRange.toString().length === 0) {
                            e.preventDefault(); 
                            if (block.type !== 'text') return this.replaceTextNodeType(block, 'text'), scheduleSave();

                            const idx = this.getBlockIndex(block.id);
                            if (idx > 0) {
                                const prevBlock = this.blocks[idx - 1]; 
                                if (prevBlock.type === 'hr') return this.deleteBlock(prevBlock.id);
                                if (!['text', 'h1', 'h2', 'h3'].includes(prevBlock.type)) return this.deleteBlock(prevBlock.id);
                                
                                const currentHtml = content.innerHTML.replace(/<br>$/, ''), prevContentNode = prevBlock.dom.querySelector('.text-content');
                                if (content.textContent.trim() !== '') { const childCount = prevContentNode.childNodes.length; prevContentNode.innerHTML += currentHtml; this.deleteBlock(block.id); setTimeout(() => setCaret(prevContentNode, childCount), 10); }
                                else { this.deleteBlock(block.id); setCaret(prevContentNode); }
                            }
                        }
                    }
                }
            }

            async triggerAIPersonas(triggerBlock, triggerContent, aiMentions) {
                const userPrompt = normalizePlainText(triggerContent.textContent);
                const meContext = pgDB.cache['persona::me']?.blocks?.map(b => normalizePlainText(b.data?.text)).join('\n') || '';
                const topicalContext = userPrompt.length > 3 ? (await pgDB.searchNotes(userPrompt, window.currentDateStr, 3)).map(h => h.searchText).join('\n\n---\n\n') : '';

                try {
                    AIService.getSettings();
                } catch (err) {
                    openAISettingsModal();
                    this.addBasicBlock('text', `<span style="color:#ef4444">${escapeHTML(err.message)}</span>`, 'system', crypto.randomUUID(), Date.now(), triggerBlock.id);
                    scheduleSave();
                    return;
                }

                let lastInsertId = triggerBlock.id;
                for (const mention of aiMentions) {
                    const { slug, name } = mention;
                    const aiInstructions = pgDB.cache[`persona::${slug}`]?.blocks?.map(b => normalizePlainText(b.data?.text)).join('\n') || '';
                    const systemPrompt = [meContext, aiInstructions, topicalContext].filter(Boolean).join('\n\n').trim();
                    
                    const aiBlock = this.addBasicBlock('text', `<span class="neon-status ai-status loading">${name} streaming...</span>`, slug, crypto.randomUUID(), Date.now(), lastInsertId);
                    const aiContent = aiBlock.dom.querySelector('.text-content');
                    lastInsertId = aiBlock.id; 

                    try {
                        let aiText = '';
                        activeAIStreams += 1;
                        updateAIStatus('loading');
                        aiContent.innerHTML = '';
                        await AIService.streamCompletion({
                            systemPrompt,
                            userPrompt,
                            onDelta: (chunk) => {
                                aiText += chunk;
                                aiContent.innerHTML = escapeHTML(aiText).replace(/\n/g, '<br>');
                            }
                        });
                        if (!aiText.trim()) aiContent.innerHTML = '<span style="color:#ef4444">empty response.</span>';
                        await this.appendToPersonaPage(slug, userPrompt, aiText);
                    } catch (err) {
                        aiContent.innerHTML = `<span style="color:#ef4444">${escapeHTML(err.message || 'connection failed.')}</span>`;
                        updateAIStatus('error', 'sys.ai.remote.error');
                    } finally {
                        activeAIStreams = Math.max(0, activeAIStreams - 1);
                        if (activeAIStreams === 0) updateAIStatus();
                    }
                }
                scheduleSave();
            }

            async appendToPersonaPage(slug, userText, aiText) {
                const pageKey = `persona::${slug}`;
                if (!pgDB.cache[pageKey]) pgDB.cache[pageKey] = { blocks: [] };
                pgDB.cache[pageKey].blocks.push(
                    { id: crypto.randomUUID(), type: 'quote', data: { text: escapeHTML(userText) }, author: 'user', timestamp: Date.now() },
                    { id: crypto.randomUUID(), type: 'text', data: { text: escapeHTML(aiText).replace(/\n/g, '<br>') }, author: slug, timestamp: Date.now() }
                );
                if (pgDB.isReady) await pgDB.saveNote(pageKey, pgDB.cache[pageKey]);
            }
        }

        const editor = new LeanStreamEditor('lean-editor'); window.editor = editor;

        // ============================================================================
        // APP LIFECYCLE & STORAGE SYNC
        // ============================================================================
        window.isPersonaPage = false; window.currentPersonaSlug = null;
        let hasLoadedInitialPage = false;

        const scheduleSave = debounce(async () => {
            if (!(CONFIG.DEV_ALLOW_PAST_EDITING || window.currentDateStr === todayStr || window.isPersonaPage)) return;
            const statusEl = document.getElementById('db-status');
            try {
                await pgDB.saveNote(window.currentDateStr, editor.save());
                statusEl.textContent = 'db.saved'; statusEl.classList.add('saving');
                setTimeout(() => { if (statusEl.textContent === 'db.saved') { statusEl.textContent = 'db.ready'; statusEl.classList.remove('saving'); } }, 1500);
            } catch (e) {
                statusEl.textContent = pgDB.isReady ? 'db.error [save failed]' : 'memory.saved [offline]';
                if (pgDB.isReady) statusEl.className = 'neon-status db-status error';
                setTimeout(() => { if (statusEl.textContent.includes('saved')) { statusEl.textContent = pgDB.isReady ? 'db.ready' : 'db.offline [memory mode]'; if (pgDB.isReady) statusEl.className = 'neon-status db-status'; } }, pgDB.isReady ? 3000 : 1500);
            }
        }, 800);

        function renderDateHeader() {
            const h = document.getElementById('date-header');
            if (window.isPersonaPage && window.currentPersonaSlug) {
                pgDB.getPersonas().then(p => h.textContent = `@${p.find(x => x.slug === window.currentPersonaSlug)?.display_name.toUpperCase() || window.currentPersonaSlug.toUpperCase()}`);
            } else h.textContent = parseLocal(window.currentDateStr).toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' }).toLowerCase();
        }

        async function persistCurrentPageBeforeNavigation() {
            if (!hasLoadedInitialPage || !pgDB.isReady || !isEditable()) return;
            try { await pgDB.saveNote(window.currentDateStr, editor.save()); } catch {}
        }

        async function loadDay(dateStr) {
            await persistCurrentPageBeforeNavigation();
            window.isPersonaPage = false; window.currentPersonaSlug = null; window.currentDateStr = dateStr;
            renderDateHeader(); document.getElementById('backlinks-container')?.remove();
            
            let dayData = pgDB.cache[dateStr] || JSON.parse(localStorage.getItem(`infinotes_backup_${dateStr}`) || '{"blocks":[]}');
            pgDB.cache[dateStr] = dayData;
            
            const virtuals = []; const targetTime = parseLocal(dateStr).getTime();
            for (const [nDate, dData] of Object.entries(pgDB.cache)) {
                if (nDate === dateStr || nDate.startsWith('persona::') || !dData?.blocks) continue;
                for (const b of dData.blocks) {
                    if (b.type === 'calendar' && b.data?.datetime) {
                        const eDate = new Date(b.data.datetime), eDateStr = getLocalYYYYMMDD(eDate), eTime = parseLocal(eDateStr).getTime(), rec = b.data.recurrence || 'none';
                        if (dateStr === eDateStr || (targetTime > eTime && (rec === 'daily' || (rec === 'weekly' && Math.round((targetTime - eTime) / 86400000) % 7 === 0) || (rec === 'monthly' && parseLocal(dateStr).getDate() === eDate.getDate()) || (rec === 'yearly' && dateStr.slice(5) === eDateStr.slice(5))))) {
                            virtuals.push(Object.assign({}, b, { isVirtual: true, originalNoteKey: nDate }));
                        }
                    }
                }
            }
            editor.load([...virtuals, ...dayData.blocks]);
            hasLoadedInitialPage = true;
        }

        async function loadPersonaPage(slug) {
            await persistCurrentPageBeforeNavigation();
            window.isPersonaPage = true; window.currentPersonaSlug = slug; window.currentDateStr = `persona::${slug}`;
            renderDateHeader(); editor.load((pgDB.cache[`persona::${slug}`] || { blocks: [] }).blocks);
            hasLoadedInitialPage = true;
            
            document.getElementById('backlinks-container')?.remove();
            const bl = pgDB.findBacklinks(slug); if (!bl.length) return;
            const section = el('div', { className: 'backlinks-section', id: 'backlinks-container' }, el('div', { className: 'backlinks-header' }, `[ ${bl.length} backlink${bl.length > 1 ? 's' : ''} ]`));
            bl.forEach(b => section.appendChild(el('button', { className: 'backlink-item', onclick: () => b.dateStr.startsWith('persona::') ? loadPersonaPage(b.dateStr.replace('persona::', '')) : loadDay(b.dateStr) }, el('span', { textContent: b.dateStr.startsWith('persona::') ? `@${b.dateStr.replace('persona::', '').toUpperCase()}` : parseLocal(b.dateStr).toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' }).toUpperCase() }), el('span', { className: 'backlink-preview', textContent: b.preview }))));
            document.querySelector('.app-container').insertBefore(section, document.querySelector('.app-container').firstChild);
        }

        document.getElementById('date-header').onclick = () => {
            if (window.isPersonaPage) return loadDay(todayStr);
            const [y, m, d] = window.currentDateStr.split('-');
            EditorialCalendar.open(new Date(y, m - 1, d), false, null, (sd) => { const sStr = getLocalYYYYMMDD(sd); if (window.currentDateStr !== sStr) { scheduleSave(); loadDay(sStr); } });
        };

        Promise.all([pgDB.init(), mediaStore.init()]).then(() => loadDay(todayStr));
    </script>
</body>
