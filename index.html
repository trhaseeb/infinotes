<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Infinite Notes</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Notes">
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#121212">
    
    <!-- Dynamic Manifest Injection -->
    <link id="pwa-manifest" rel="manifest" href="">
    <link id="pwa-icon" rel="apple-touch-icon" href="">

    <!-- Core Editor & Plugins -->
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/editorjs@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/paragraph@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/header@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/nested-list@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/checklist@latest"></script>

    <!-- Leaflet for Map Tool -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* --- Standardized Pure Flat Theme --- */
        :root {
            --bg-color: #ffffff; --text-color: #000000; --border-color: #e0e0e0;
            --muted-bg: #f5f5f5; --muted-text: #666666; --accent-color: #000000;
            --recall-bg: #fcfcfc; --recall-border: #cccccc;
            --editor-toolbar-bg: #ffffff; --editor-hover-bg: #ebebeb; --overlay-bg: transparent; 
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --keyboard-offset: 0px; --safe-area-top: env(safe-area-inset-top, 0px);
            --std-border-radius: 8px; --std-padding: 12px 14px; --std-margin: 8px 0;
            --std-icon-size: 20px; --std-control-height: 36px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212; --text-color: #ffffff; --border-color: #333333;
                --muted-bg: #1e1e1e; --muted-text: #aaaaaa; --accent-color: #ffffff;
                --recall-bg: #1a1a1a; --recall-border: #444444;
                --editor-toolbar-bg: #1e1e1e; --editor-hover-bg: #2a2a2a;
            }
        }

        body { background-color: var(--bg-color); color: var(--text-color); font-family: var(--font-main); margin: 0; padding: 0; line-height: 1.6; width: 100vw; overflow-x: hidden; }
        .app-container { max-width: 800px; width: 100%; margin: 0 auto; padding: calc(10vh + var(--safe-area-top)) 40px 65vh 40px; box-sizing: border-box; }
        #editorjs { padding: 0; max-width: 100%; box-sizing: border-box; min-height: 50vh; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        ::-webkit-scrollbar:horizontal { display: none; }
        svg { flex-shrink: 0; }

        /* Editor.js Overrides */
        .ce-block { position: relative; z-index: auto !important; } 
        .ce-toolbar { z-index: 10000 !important; }
        .ce-popover, .ce-settings, .tc-popover, .cdx-settings, .ce-tooltip { z-index: 10005 !important; }
        .ce-block__content { max-width: 100% !important; }
        .ce-toolbar__plus, .ce-toolbar__settings-btn { background-color: var(--bg-color) !important; color: var(--text-color) !important; border: 1px solid transparent; }
        .ce-toolbar__plus:hover, .ce-toolbar__settings-btn:hover { background-color: var(--editor-hover-bg) !important; border-color: var(--border-color); }
        .ce-popover__overlay, .ce-popover-overlay, .cdx-overlay { background: var(--overlay-bg) !important; background-color: var(--overlay-bg) !important; box-shadow: none !important; backdrop-filter: none !important; }
        .ce-popover-item__icon svg { width: var(--std-icon-size) !important; height: var(--std-icon-size) !important; }
        .ce-popover-item__title { font-size: 14px !important; font-weight: 500 !important; }

        @media (prefers-color-scheme: dark) {
            .ce-popover, .ce-popover__container, .ce-popover__panel, .ce-popover__items, .ce-inline-toolbar, .ce-conversion-toolbar, .ce-settings, .ce-tooltip { background: var(--editor-toolbar-bg) !important; background-color: var(--editor-toolbar-bg) !important; border-color: var(--border-color) !important; box-shadow: none !important; }
            .ce-tooltip { color: var(--text-color) !important; }
            .ce-popover-item, .ce-inline-tool, .ce-conversion-tool, .ce-settings__button { background-color: transparent !important; color: var(--text-color) !important; }
            .ce-popover-item__title { color: var(--text-color) !important; }
            .ce-popover-item:hover, .ce-inline-tool:hover, .ce-conversion-tool:hover, .ce-settings__button:hover { background-color: var(--editor-hover-bg) !important; }
            .ce-popover-item__icon, .ce-popover-item__icon--active, .ce-popover__item-icon { background-color: var(--muted-bg) !important; color: var(--text-color) !important; box-shadow: none !important; border-color: var(--border-color) !important; }
            .cdx-search-field, .cdx-input { background-color: var(--muted-bg) !important; color: var(--text-color) !important; border: 1px solid var(--border-color) !important; box-shadow: none !important; }
            .cdx-search-field__icon { color: var(--muted-text) !important; }
            .ce-block--selected .ce-block__content { background-color: var(--editor-hover-bg) !important; }
            ::selection { background: var(--border-color) !important; color: var(--text-color); }
        }

        /* --- STYLISH BRUTALIST HEADER & AI SUBTITLE --- */
        #date-header { 
            text-align: left; font-size: clamp(60px, 18vw, 150px); font-weight: 900; 
            font-style: italic; text-transform: uppercase; letter-spacing: -0.06em; 
            line-height: 0.8; color: var(--text-color); margin: -20px 0 5px -25px; 
            cursor: pointer; transition: opacity 0.2s; user-select: none; white-space: nowrap; 
        }
        #date-header:hover { opacity: 0.7; }
        
        .header-status-row { display: flex; align-items: center; margin: 0 0 40px -20px; user-select: none; }

        .ai-inline-status { font-family: var(--font-main); font-size: 13px; font-weight: 600; color: #a855f7; opacity: 0.8; transition: opacity 0.3s ease; text-transform: lowercase; }
        .ai-inline-status.loading { animation: pulse-opacity 2s infinite ease-in-out; }
        .ai-inline-status.error { color: #ef4444; opacity: 1; }

        .save-indicator { font-family: var(--font-main); font-size: 11px; font-weight: 500; color: var(--muted-text); margin-left: 12px; opacity: 0; transition: opacity 0.4s ease; text-transform: lowercase; }
        .save-indicator.visible { opacity: 1; }
        
        .storage-warning { font-family: var(--font-main); font-size: 12px; font-weight: 600; color: #ef4444; margin-left: 12px; display: none; }

        @keyframes pulse-opacity { 0%, 100% { opacity: 0.8; } 50% { opacity: 0.3; } }

        .ce-block-time { display: flex; justify-content: flex-end; align-items: center; gap: 8px; font-size: 11px; color: var(--muted-text); text-align: right; padding-top: 6px; padding-bottom: 2px; padding-right: 2px; user-select: none; opacity: 0.7; font-weight: 500; }
        .ce-block-author { display: inline-flex; align-items: center; padding: 2px 6px; border: 1px solid var(--border-color); border-radius: 999px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }
        .ce-block-author.ai { background: var(--text-color); color: var(--bg-color); border-color: var(--text-color); }
        .ce-block-author.user { background: var(--muted-bg); color: var(--text-color); }
        
        /* --- SEAMLESS AI STREAM BLOCK STYLES --- */
        .ai-stream-wrapper { margin: 4px 0; padding: 4px 0; position: relative; }
        .ai-stream-content { font-family: var(--font-main); font-size: 16px; color: var(--text-color); line-height: 1.6; white-space: pre-wrap; outline: none; }
        .ai-cursor { display: inline-block; width: 8px; height: 1em; background-color: #a855f7; margin-left: 2px; animation: blink 1s step-end infinite; vertical-align: text-bottom; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* --- TOOL STYLES --- */
        .cal-btn { padding: 8px 12px; background: transparent; border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-color); cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px; white-space: nowrap; }
        .cal-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
        .cal-btn:hover { background: var(--editor-hover-bg); }
        .cal-btn.primary { background: var(--text-color); color: var(--bg-color); border-color: var(--text-color); }
        .cal-btn.primary:hover { opacity: 0.9; }
        .tool-title-input { width: 100%; border: none; background: transparent; color: var(--text-color); font-size: 16px; font-weight: 600; outline: none; font-family: inherit; padding: 4px 0; margin-bottom: 8px; }
        .tool-title-input::placeholder { color: var(--muted-text); font-weight: 500; opacity: 0.6; }

        .global-calendar-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.4); z-index: 100000; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s ease; backdrop-filter: blur(2px); }
        .global-calendar-modal.show { display: flex; opacity: 1; }
        .cp-container { background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; width: 90%; max-width: 340px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); display: flex; flex-direction: column; gap: 12px; }
        .cp-header { display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .cp-header button { background: var(--muted-bg); border: 1px solid var(--border-color); color: var(--text-color); border-radius: 6px; width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .cp-header button:hover { background: var(--editor-hover-bg); }
        .cp-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 12px; color: var(--muted-text); font-weight: 600; margin-bottom: 4px; }
        .cp-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .cp-day { padding: 8px 0; text-align: center; font-size: 14px; cursor: pointer; border-radius: 6px; color: var(--text-color); transition: background 0.1s; }
        .cp-day:hover:not(.muted) { background: var(--editor-hover-bg); }
        .cp-day.active { background: var(--text-color) !important; color: var(--bg-color) !important; font-weight: bold; }
        .cp-day.muted { color: var(--border-color); pointer-events: none; opacity: 0.3; }
        .cp-time { display: flex; justify-content: center; align-items: center; gap: 6px; padding-top: 16px; border-top: 1px solid var(--border-color); }
        #dp-time-input { width: 100%; padding: 10px; font-size: 16px; text-align: center; border-radius: 6px; border: 1px solid var(--border-color); background: var(--muted-bg); color: var(--text-color); font-family: inherit; outline: none; }

        .compute-tool-container { border: 1px solid var(--border-color); border-radius: var(--std-border-radius); background: var(--muted-bg); overflow: hidden; margin: 8px 0; display: flex; flex-direction: column; }
        .compute-input { width: 100%; padding: 16px 16px 12px 16px; background: transparent; border: none; outline: none; font-family: monospace; font-size: 14px; color: var(--text-color); resize: none; box-sizing: border-box; line-height: 1.5; min-height: 50px; font-weight: bold; }
        .compute-input::placeholder { color: var(--muted-text); opacity: 0.5; font-weight: normal; }
        .compute-output { padding: 12px 16px; border-top: 1px dashed var(--border-color); font-family: monospace; font-size: 16px; font-weight: 700; color: var(--text-color); background: var(--bg-color); word-break: break-word; min-height: 20px; }
        .compute-error { color: #EF4444; font-weight: 400; font-size: 13px; }

        .scan-wrapper { margin: 8px 0; width: 100%; border: 1px dashed var(--border-color); border-radius: var(--std-border-radius); display: flex; flex-direction: column; overflow: hidden; }
        .scan-action-area { padding: 30px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; cursor: pointer; transition: background 0.2s; }
        .scan-action-area:hover { background: var(--editor-hover-bg); }
        .scan-icon { color: var(--muted-text); }
        .scan-icon svg { width: 32px; height: 32px; }
        .scan-label { font-size: 14px; font-weight: 600; color: var(--text-color); letter-spacing: 1px; }
        .scan-status { font-family: monospace; font-size: 12px; font-weight: bold; color: var(--muted-text); margin-top: 10px; }
        .scan-output-textarea { width: 100%; min-height: 100px; padding: 16px; border: none; background: var(--muted-bg); color: var(--text-color); font-family: monospace; font-size: 13px; line-height: 1.5; resize: none; outline: none; box-sizing: border-box; }

        .recall-search-wrapper { position: relative; width: 100%; margin: 8px 0; }
        .recall-search-input { width: 100%; padding: 12px 14px 12px 40px; border-radius: var(--std-border-radius); border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-color); font-family: inherit; font-size: 15px; outline: none; box-sizing: border-box; transition: border-color 0.2s; }
        .recall-search-input:focus { border-color: var(--text-color); }
        .recall-search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; color: var(--muted-text); }
        .recall-dropdown { position: absolute; top: 100%; left: 0; width: 100%; background: var(--bg-color); border: 1px solid var(--border-color); border-radius: var(--std-border-radius); margin-top: 4px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); z-index: 1000; max-height: 250px; overflow-y: auto; display: none; }
        .recall-dropdown.active { display: block; }
        .recall-result-item { padding: 12px 14px; cursor: pointer; border-bottom: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 4px; }
        .recall-result-item:last-child { border-bottom: none; }
        .recall-result-item:hover { background: var(--editor-hover-bg); }
        .recall-result-meta { font-size: 11px; color: var(--text-color); font-weight: 600; opacity: 0.7; }
        .recall-result-snippet { font-size: 14px; color: var(--muted-text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .recalled-block { margin: 8px 0; padding: 12px 16px; background: var(--recall-bg); border-left: 4px solid var(--recall-border); border-radius: 4px var(--std-border-radius) var(--std-border-radius) 4px; position: relative; }
        .recalled-orig-meta { font-size: 10px; color: var(--muted-text); font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .recalled-orig-meta svg { width: 12px; height: 12px; }

        .calendar-tool-container { display: flex; flex-direction: column; gap: 12px; width: 100%; margin: 8px 0; }
        .cal-header { display: flex; align-items: center; gap: 10px; }
        .cal-header svg { color: var(--muted-text); }
        .cal-title { flex-grow: 1; border: none; background: transparent; color: var(--text-color); font-size: 18px; font-weight: 600; outline: none; font-family: inherit; }
        .cal-display-btn { border: 1px solid var(--border-color); background: var(--muted-bg); color: var(--text-color); border-radius: 6px; padding: 10px 14px; font-family: inherit; font-size: 14px; outline: none; cursor: pointer; text-align: left; display: flex; align-items: center; justify-content: space-between; }
        .cal-display-btn:hover { background: var(--editor-hover-bg); }
        .cal-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .cal-actions .cal-btn { flex: 1; min-width: 130px; }

        .voice-tool-container { display: flex; align-items: center; gap: 12px; margin: 8px 0; }
        .v-memo__btn { width: var(--std-control-height); height: var(--std-control-height); border-radius: 50%; border: 1px solid var(--border-color); background: var(--muted-bg); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-color); flex-shrink: 0; min-width: var(--std-control-height); transition: all 0.2s; }
        .v-memo__btn:hover { background: var(--editor-hover-bg); }
        .v-memo__btn.recording { color: #ffffff; border-color: #ef4444; background: #ef4444; animation: pulse 1.5s infinite; }
        .v-memo__btn.playing { color: #ffffff; border-color: #3B82F6; background: #3B82F6; }
        .v-memo__title { flex-grow: 1; border: none; background: transparent; color: var(--text-color); font-size: 15px; font-weight: 600; outline: none; font-family: inherit; min-width: 0; }
        .v-memo__status { font-size: 13px; color: var(--muted-text); white-space: nowrap; font-weight: 500; }
        
        .smart-canvas-selector { display: flex; gap: 12px; padding: 12px 0; justify-content: center; flex-wrap: wrap; }
        .smart-canvas-option { flex: 1; min-width: 100px; display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 24px 10px; border: 1px dashed var(--border-color); border-radius: 8px; background: transparent; color: var(--text-color); cursor: pointer; transition: all 0.2s; font-size: 13px; font-weight: 500; font-family: inherit; }
        .smart-canvas-option:hover { background: var(--editor-hover-bg); border-style: solid; }
        .smart-canvas-option svg { width: 32px; height: 32px; color: var(--muted-text); transition: color 0.2s; }
        
        .canvas-relative-frame { position: relative; width: 100%; border-radius: var(--std-border-radius); border: 1px solid var(--border-color); overflow: hidden; margin: 8px 0; }
        .block-controls-stack { position: absolute; top: 10px; left: 10px; display: flex; flex-direction: column; gap: 8px; z-index: 401 !important; }
        .canvas-action-btn { width: 32px; height: 32px; border-radius: 6px; background: var(--editor-toolbar-bg); border: 1px solid var(--border-color); color: var(--text-color); cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0.8; transition: all 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.15); }
        .canvas-action-btn.active { background: var(--text-color); color: var(--bg-color); opacity: 1; border-color: var(--text-color); }
        
        .leaflet-container { background: var(--bg-color) !important; z-index: 1 !important; width: 100%; height: 400px; border: none; }
        .leaflet-container.drawing-mode, .leaflet-container.drawing-mode .leaflet-interactive { cursor: crosshair !important; touch-action: none; }
        .leaflet-container.locked-mode { cursor: default !important; }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="date-header"></div>
        <div class="header-status-row">
            <div id="ai-inline-status" class="ai-inline-status loading">initializing...</div>
            <span id="save-indicator" class="save-indicator">saved</span>
            <span id="storage-warning" class="storage-warning">Private Mode: Notes will not be saved</span>
        </div>
        <div id="editorjs"></div>
    </div>

    <!-- Modals -->
    <div id="global-calendar-modal" class="global-calendar-modal">
        <div class="cp-container" onclick="event.stopPropagation()">
            <div class="cp-header">
                <button id="dp-prev"><</button>
                <span id="dp-month-label">Month Year</span>
                <button id="dp-next">></button>
            </div>
            <div class="cp-weekdays">
                <span>Su</span><span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span>
            </div>
            <div id="dp-grid" class="cp-grid"></div>
            <div id="dp-time-section" class="cp-time" style="display: none;">
                <input type="time" id="dp-time-input" required>
            </div>
            <div style="margin-top: 12px; display: flex; gap: 8px;">
                <button id="dp-today-btn" class="cal-btn" style="flex: 1;">Today</button>
                <button id="dp-confirm-btn" class="cal-btn primary" style="flex: 1;">Confirm</button>
            </div>
        </div>
    </div>

    <script type="module">
        // ============================================================================
        // ⚙️ AI & APP CONFIGURATION
        // ============================================================================
        const CONFIG = {
            AI_NAME: "bro", 
            AI_PERSONALITY: "You are intelligent, youre chill, you leadn quick and your have a flawless memory. youre a bro",
            PWA_LOGO_URL: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iIzAwMDAwMCI+PHBhdGggZD0iTTE0IDJINmEyIDIgMCAwIDAtMiAydjE2YTIgMiAwIDAgMCAyIDJoMTJhMiAyIDAgMCAwIDItMlY4bC02LTZ6Ii8+PC9zdmc+",
            EMBEDDING_MODEL_ID: "Xenova/all-MiniLM-L6-v2",
            SEMANTIC_SEARCH_LIMIT: 8,
            AI_MEMORY_LIMIT: 6,
            SEMANTIC_MIN_SCORE: 0.22
        };

        document.getElementById('pwa-icon').href = CONFIG.PWA_LOGO_URL;
        document.getElementById('pwa-manifest').href = 'data:application/manifest+json;charset=utf-8,' + encodeURIComponent(JSON.stringify({
            "name": "Infinite Notes", "short_name": "Notes", "start_url": ".", "display": "standalone",
            "background_color": window.matchMedia('(prefers-color-scheme: dark)').matches ? "#121212" : "#ffffff",
            "theme_color": window.matchMedia('(prefers-color-scheme: dark)').matches ? "#121212" : "#ffffff",
            "icons": [{"src": CONFIG.PWA_LOGO_URL, "sizes": "192x192", "type": "image/svg+xml"}]
        }));

        if (window.visualViewport) {
            const updateKeyboardOffset = () => { document.documentElement.style.setProperty('--keyboard-offset', `${Math.max(0, window.innerHeight - window.visualViewport.height)}px`); };
            window.visualViewport.addEventListener('resize', updateKeyboardOffset); updateKeyboardOffset();
        }

        const ICONS = {
            mic: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>',
            stop: '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"></rect></svg>',
            play: '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>',

        function createEl(tag, classNames = '', attributes = {}, children = []) {
            const el = document.createElement(tag); if (classNames) el.className = classNames;
            for (const [k, v] of Object.entries(attributes)) { if (k === 'innerHTML') el.innerHTML = v; else if (k === 'textContent') el.textContent = v; else if (k === 'style') el.style.cssText = v; else el.setAttribute(k, v); }
            children.forEach(c => c && el.append(c)); return el;
        }

        function normalizePlainText(text = '') {
            return String(text)
                .replace(/<br\s*\/?>/gi, '\n')
                .replace(/<[^>]*>?/gm, '')
                .replace(/\s+/g, ' ')
                .trim();
        }

        function clampText(text = '', maxLength = 1200) {
            if (text.length <= maxLength) return text;
            return text.slice(0, maxLength).trimEnd() + '...';
        }

        function escapeHTML(text = '') {
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function getListItemText(item = {}) {
            return normalizePlainText(item.content || item.text || '');
        }

        function getBlockLabel(block = {}) {
            const labels = {
                paragraph: 'note',
                header: 'header',
                list: 'list',
                checklist: 'checklist',
                scan: 'scan',
                compute: 'compute',
                smartCanvas: 'canvas',
                calendar: 'event',
                voice: 'voice',
                recall: 'recall'
            };
            return labels[block.type] || (block.type || 'block');
        }

        function getBlockSearchText(block = {}) {
            if (!block.data || block.type === 'recall') return '';
            if (block.type === 'paragraph' || block.type === 'header' || block.type === 'scan') return normalizePlainText(block.data.text || '');
            if (block.type === 'list' || block.type === 'checklist') return (block.data.items || []).map(getListItemText).filter(Boolean).join(' | ');
            if (block.type === 'calendar') return normalizePlainText(`${block.data.title || 'calendar event'} ${block.data.datetime || ''}`);
            if (block.type === 'voice') return normalizePlainText(block.data.title || 'voice memo');
            if (block.type === 'smartCanvas') return normalizePlainText(`${block.data.title || ''} ${block.data.mode || 'canvas'}`);
            if (block.type === 'compute') return normalizePlainText(`${block.data.code || ''} ${normalizePlainText(block.data.output || '')}`);
            return normalizePlainText(JSON.stringify(block.data));
        }

        function buildRecallSnippet(block = {}) {
            if (!block.data) return 'Empty block';
            if (block.type === 'paragraph' || block.type === 'header' || block.type === 'scan') return normalizePlainText(block.data.text || '') || 'Empty text';
            if (block.type === 'calendar') return `Calendar: ${block.data.title || 'Untitled event'}`;
            if (block.type === 'voice') return `Voice: ${block.data.title || 'Untitled memo'}`;
            if (block.type === 'smartCanvas') return `Canvas: ${block.data.title || block.data.mode || 'Untitled canvas'}`;
            if (block.type === 'list' || block.type === 'checklist') return (block.data.items || []).map(getListItemText).filter(Boolean).join(', ') || 'Empty list';
            if (block.type === 'compute') return `Compute: ${block.data.code || ''}`.trim();
            return `${getBlockLabel(block)} block`;
        }

        function getStableBlockId(block = {}, fallbackIndex = 0) {
            return block.id || `${block.type || 'block'}-${fallbackIndex}`;
        }

        function findBlockById(dayData, blockId) {
            if (!dayData || !dayData.blocks || !blockId) return null;
            return dayData.blocks.find((block, index) => getStableBlockId(block, index) === blockId) || null;
        }

        function dotProduct(left = [], right = []) {
            const size = Math.min(left.length, right.length);
            let sum = 0;
            for (let index = 0; index < size; index += 1) sum += left[index] * right[index];
            return sum;
        }

        function tensorToVector(output) {
            if (!output) return [];
            if (typeof output.tolist === 'function') {
                const list = output.tolist();
                if (Array.isArray(list[0])) return list[0].map(Number);
                return list.map(Number);
            }
            if (output.data) return Array.from(output.data, Number);
            if (Array.isArray(output)) return output.flat(Infinity).map(Number);
            return [];
        }

        function findEditorBlockIndexById(editorInstance, blockId) {
            if (!editorInstance || !blockId) return -1;
            for (let index = 0; index < editorInstance.blocks.getBlocksCount(); index += 1) {
                const block = editorInstance.blocks.getBlockByIndex(index);
                if (block && block.id === blockId) return index;
            }
            return -1;
        }

        const DB_VERSION = 3;

        function ensureDatabaseStores(db) {
            if (!db.objectStoreNames.contains('daily_notes')) db.createObjectStore('daily_notes');
            if (!db.objectStoreNames.contains('semantic_index')) {
                const semanticStore = db.createObjectStore('semantic_index', { keyPath: 'key' });
                semanticStore.createIndex('by_date', 'date', { unique: false });
            }
            if (!db.objectStoreNames.contains('media_blobs')) {
                const mediaBlobs = db.createObjectStore('media_blobs', { keyPath: 'id' });
                mediaBlobs.createIndex('by_kind', 'kind', { unique: false });
            }
        }

        function createObjectUrl(blob) {

                return URL.createObjectURL(blob);
            } catch (error) {
                console.error('Unable to create object URL:', error);

        function revokeObjectUrl(url) {
            if (!url || !url.startsWith('blob:')) return;
            URL.revokeObjectURL(url);

        function getAuthorLabel(author = 'user') {
            return author === 'ai' ? CONFIG.AI_NAME : 'you';

        const NotificationEngine = {
            timers: new Map(),
            schedule: function(id, dt, title) {
                this.cancel(id); if (typeof Notification === 'undefined' || Notification.permission !== 'granted') return;
                const delay = new Date(dt).getTime() - Date.now();
                if (delay > 0) this.timers.set(id, setTimeout(() => { new Notification('Note Reminder', { body: title || 'Scheduled Event Reached' }); this.timers.delete(id); }, delay));
            },
            cancel: function(id) { if (this.timers.has(id)) { clearTimeout(this.timers.get(id)); this.timers.delete(id); } }
        };

        function getLocalYYYYMMDD(date) { return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`; }

        // ============================================================================
        // 💾 ROBUST, ASYNCHRONOUS STORAGE ADAPTER (No main-thread blocking)
        // ============================================================================
        class IndexedDBAdapter {
            constructor() { 
                this.dbName = 'InfiniteNotesDB'; 
                this.storeName = 'daily_notes'; 
                this.cache = {}; 
                this.isMemoryOnly = false; 
                this.saveQueue = Promise.resolve(); // Strict queue to prevent race conditions
            }

            init() {
                return new Promise((resolve) => {
                    try {
                        const req = indexedDB.open(this.dbName, DB_VERSION);
                        req.onupgradeneeded = (e) => {
                            ensureDatabaseStores(e.target.result);
                        };
                        req.onsuccess = (e) => { 
                            this.db = e.target.result; 
                            this.loadAll().then(data => { this.cache = data; resolve(); }); 
                        };
                        req.onerror = () => { this.enableFallback(resolve); };
                    } catch(e) { this.enableFallback(resolve); }
                });
            }

            enableFallback(resolve) {
                this.isMemoryOnly = true;
                document.getElementById('storage-warning').style.display = 'block';
                resolve();
            }

            // All saves are queued asynchronously so they never trample each other or block UI
            save(dateStr, data) {
                this.cache[dateStr] = data;
                if (this.isMemoryOnly || !this.db) return Promise.resolve();

                this.saveQueue = this.saveQueue.then(() => {
                    return new Promise((resolve, reject) => {
                        const tx = this.db.transaction(this.storeName, 'readwrite');
                        const store = tx.objectStore(this.storeName);
                        const req = store.put(data, dateStr);
                        req.onsuccess = () => resolve();
                        req.onerror = () => reject(req.error);
                    });
                }).catch(err => console.error("IDB Save Error:", err));

                return this.saveQueue;
            }

            loadAll() {
                return new Promise(resolve => {
                    if (this.isMemoryOnly || !this.db) return resolve({});
                    try {
                        const tx = this.db.transaction(this.storeName, 'readonly');
                        const store = tx.objectStore(this.storeName);
                        const valReq = store.getAll(); const keyReq = store.getAllKeys();
                        
                        tx.oncomplete = () => {
                            const result = {};
                            if (keyReq.result && valReq.result) {
                                keyReq.result.forEach((key, i) => result[key] = valReq.result[i]);
                            }
                            resolve(result);
                        };
                        tx.onerror = () => resolve({});
                    } catch(e) { resolve({}); }
                });
            }
        }
        let appDB = new IndexedDBAdapter();

        class MediaBlobStore {
            constructor() {
                this.dbName = 'InfiniteNotesDB';
                this.storeName = 'media_blobs';
                this.db = null;
                this.isAvailable = true;
            }

            init() {
                return new Promise((resolve) => {
                    try {
                        const req = indexedDB.open(this.dbName, DB_VERSION);
                        req.onupgradeneeded = (e) => { ensureDatabaseStores(e.target.result); };
                        req.onsuccess = (e) => { this.db = e.target.result; resolve(); };
                        req.onerror = () => { this.isAvailable = false; resolve(); };
                    } catch (error) {
                        this.isAvailable = false;
                        resolve();
                    }
                });
            }

            saveBlob(id, blob, kind = 'generic') {
                return new Promise((resolve, reject) => {
                    if (!this.db || !this.isAvailable || !id || !blob) return resolve();
                    try {
                        const tx = this.db.transaction(this.storeName, 'readwrite');
                        tx.objectStore(this.storeName).put({ id, blob, kind, updatedAt: Date.now() });
                        tx.oncomplete = () => resolve();
                        tx.onerror = () => reject(tx.error);
                    } catch (error) {
                        reject(error);
                    }
                });
            }

            getBlob(id) {
                return new Promise((resolve) => {
                    if (!this.db || !this.isAvailable || !id) return resolve(null);
                    try {
                        const tx = this.db.transaction(this.storeName, 'readonly');
                        const req = tx.objectStore(this.storeName).get(id);
                        req.onsuccess = () => resolve(req.result?.blob || null);
                        req.onerror = () => resolve(null);
                    } catch (error) {
                        resolve(null);
                    }
                });
            }
        }
        let mediaStore = new MediaBlobStore();

        class VectorDBAdapter {
            constructor() {
                this.dbName = 'InfiniteNotesDB';
                this.storeName = 'semantic_index';
                this.cache = new Map();
                this.pendingDays = new Map();
                this.db = null;
                this.embedder = null;
                this.embedderPromise = null;
                this.isProcessing = false;
                this.isAvailable = true;
                this.modelFailed = false;
            }

            init() {
                return new Promise((resolve) => {
                    try {
                        const req = indexedDB.open(this.dbName, DB_VERSION);
                        req.onupgradeneeded = (e) => {
                            ensureDatabaseStores(e.target.result);
                        };
                        req.onsuccess = (e) => {
                            this.db = e.target.result;
                            this.loadAll().then(entries => {
                                entries.forEach(entry => this.cache.set(entry.key, entry));
                                resolve();
                            });
                        };
                        req.onerror = () => { this.isAvailable = false; resolve(); };
                    } catch (e) {
                        this.isAvailable = false;
                        resolve();
                    }
                });
            }

            loadAll() {
                return new Promise(resolve => {
                    if (!this.isAvailable || !this.db) return resolve([]);
                    try {
                        const tx = this.db.transaction(this.storeName, 'readonly');
                        const store = tx.objectStore(this.storeName);
                        const req = store.getAll();
                        req.onsuccess = () => resolve(req.result || []);
                        req.onerror = () => resolve([]);
                    } catch (e) {
                        resolve([]);
                    }
                });
            }

            async ensureEmbedder() {
                if (this.embedder) return this.embedder;
                if (this.modelFailed) throw new Error('Embedding model unavailable');
                if (!this.embedderPromise) {
                    this.embedderPromise = (async () => {
                        const { pipeline, env } = await import('https://esm.run/@huggingface/transformers');
                        env.allowRemoteModels = true;
                        env.useBrowserCache = true;

                        if (navigator.gpu) {
                            try {
                                return await pipeline('feature-extraction', CONFIG.EMBEDDING_MODEL_ID, { device: 'webgpu' });
                            } catch (error) {
                                console.warn('WebGPU embeddings unavailable, falling back to WASM.', error);
                            }
                        }

                        return pipeline('feature-extraction', CONFIG.EMBEDDING_MODEL_ID, { dtype: 'q8' });
                    })().then(embedder => {
                        this.embedder = embedder;
                        return embedder;
                    }).catch(error => {
                        this.modelFailed = true;
                        this.embedderPromise = null;
                        throw error;
                    });
                }
                return this.embedderPromise;
            }

            async embedText(text) {
                const normalized = clampText(normalizePlainText(text), 1200);
                if (!normalized) return null;
                try {
                    const embedder = await this.ensureEmbedder();
                    const output = await embedder(normalized, { pooling: 'mean', normalize: true });
                    const vector = tensorToVector(output);
                    return vector.length ? vector : null;
                } catch (error) {
                    console.error('Embedding generation failed:', error);
                    return null;
                }
            }

            extractEntries(dateStr, dayData) {
                if (!dayData || !dayData.blocks) return [];
                return dayData.blocks.map((block, index) => {
                    if (block.type === 'recall') return null;
                    const searchText = clampText(getBlockSearchText(block), 1200);
                    if (!searchText) return null;
                    const blockId = getStableBlockId(block, index);
                    const timestamp = (dayData.timestamps && block.id && dayData.timestamps[block.id]) || 0;
                    return {
                        key: `${dateStr}::${blockId}`,
                        date: dateStr,
                        blockId,
                        type: block.type,
                        searchText,
                        timestamp
                    };
                }).filter(Boolean);
            }

            ensureBackfill(noteCache) {
                if (!this.isAvailable || this.cache.size > 0 || !noteCache) return;
                Object.entries(noteCache).forEach(([dateStr, dayData]) => this.scheduleIndexDay(dateStr, dayData));
            }

            scheduleIndexDay(dateStr, dayData) {
                if (!this.isAvailable || !dateStr || !dayData || !dayData.blocks) return;
                this.pendingDays.set(dateStr, JSON.parse(JSON.stringify(dayData)));
                void this.processQueue();
            }

            async processQueue() {
                if (this.isProcessing) return;
                this.isProcessing = true;
                while (this.pendingDays.size > 0) {
                    const [dateStr, dayData] = this.pendingDays.entries().next().value;
                    this.pendingDays.delete(dateStr);
                    try {
                        await this.indexDay(dateStr, dayData);
                    } catch (error) {
                        console.error('Semantic indexing failed:', error);
                    }
                }
                this.isProcessing = false;
            }

            async indexDay(dateStr, dayData) {
                if (!this.db) return;
                const entries = this.extractEntries(dateStr, dayData);
                const indexedEntries = [];
                for (const entry of entries) {
                    const vector = await this.embedText(entry.searchText);
                    if (vector) indexedEntries.push({ ...entry, vector });
                }
                await this.replaceDayEntries(dateStr, indexedEntries);
            }

            replaceDayEntries(dateStr, entries) {
                return new Promise((resolve, reject) => {
                    if (!this.db) return resolve();
                    try {
                        const tx = this.db.transaction(this.storeName, 'readwrite');
                        const store = tx.objectStore(this.storeName);
                        const dateIndex = store.index('by_date');
                        const removeReq = dateIndex.openCursor(IDBKeyRange.only(dateStr));

                        removeReq.onsuccess = (event) => {
                            const cursor = event.target.result;
                            if (cursor) {
                                store.delete(cursor.primaryKey);
                                cursor.continue();
                                return;
                            }
                            entries.forEach(entry => store.put(entry));
                        };
                        removeReq.onerror = () => reject(removeReq.error);

                        tx.oncomplete = () => {
                            Array.from(this.cache.keys()).forEach(key => {
                                if (key.startsWith(`${dateStr}::`)) this.cache.delete(key);
                            });
                            entries.forEach(entry => this.cache.set(entry.key, entry));
                            resolve();
                        };
                        tx.onerror = () => reject(tx.error);
                    } catch (error) {
                        reject(error);
                    }
                });
            }

            async search(query, options = {}) {
                const normalized = normalizePlainText(query);
                if (!normalized || !this.cache.size) return [];
                const queryVector = await this.embedText(normalized);
                if (!queryVector) return [];
                const minScore = options.minScore ?? CONFIG.SEMANTIC_MIN_SCORE;
                const limit = options.limit ?? CONFIG.SEMANTIC_SEARCH_LIMIT;
                const results = [];

                for (const entry of this.cache.values()) {
                    if (options.excludeDate && entry.date === options.excludeDate) continue;
                    const score = dotProduct(queryVector, entry.vector || []);
                    if (score >= minScore) results.push({ ...entry, score, source: 'semantic' });
                }

                results.sort((left, right) => {
                    if (right.score !== left.score) return right.score - left.score;
                    const dateDiff = new Date(right.date).getTime() - new Date(left.date).getTime();
                    if (dateDiff !== 0) return dateDiff;
                    return (right.timestamp || 0) - (left.timestamp || 0);
                });
                return results.slice(0, limit);
            }
        }
        let vectorDB = new VectorDBAdapter();

        function collectKeywordRecallResults(query, options = {}) {
            const normalized = normalizePlainText(query).toLowerCase();
            if (!normalized) return [];
            const results = [];
            Object.entries(appDB.cache).forEach(([dateStr, dayData]) => {
                if (options.excludeDate && dateStr === options.excludeDate) return;
                if (!dayData || !dayData.blocks) return;
                dayData.blocks.forEach(block => {
                    if (block.type === 'recall') return;
                    const searchableText = `${getBlockLabel(block)} ${getBlockSearchText(block)}`.toLowerCase();
                    if (!searchableText.includes(normalized)) return;
                    const timestamp = (dayData.timestamps && block.id && dayData.timestamps[block.id]) || 0;
                    results.push({ date: dateStr, block, timestamp, source: 'keyword', score: 1 });
                });
            });
            results.sort((left, right) => {
                const dateDiff = new Date(right.date).getTime() - new Date(left.date).getTime();
                if (dateDiff !== 0) return dateDiff;
                return (right.timestamp || 0) - (left.timestamp || 0);
            });
            return results;
        }

        function hydrateSemanticRecallResult(result) {
            const dayData = appDB.cache[result.date];
            const block = findBlockById(dayData, result.blockId);
            if (!block || block.type === 'recall') return null;
            return {
                date: result.date,
                block,
                timestamp: result.timestamp || 0,
                source: result.source || 'semantic',
                score: result.score || 0
            };
        }

        function mergeRecallResults(keywordResults, semanticResults, limit = 12) {
            const merged = new Map();
            const upsert = (result) => {
                if (!result || !result.block) return;
                const key = `${result.date}::${result.block.id || buildRecallSnippet(result.block)}`;
                const existing = merged.get(key);
                if (existing) {
                    existing.score = Math.max(existing.score || 0, result.score || 0);
                    existing.source = existing.source === result.source ? existing.source : 'hybrid';
                    return;
                }
                merged.set(key, { ...result });
            };

            keywordResults.slice(0, limit).forEach((result, index) => upsert({ ...result, score: 1.1 - (index * 0.01) }));
            semanticResults.slice(0, limit).forEach(upsert);

            return Array.from(merged.values()).sort((left, right) => {
                if ((right.score || 0) !== (left.score || 0)) return (right.score || 0) - (left.score || 0);
                const dateDiff = new Date(right.date).getTime() - new Date(left.date).getTime();
                if (dateDiff !== 0) return dateDiff;
                return (right.timestamp || 0) - (left.timestamp || 0);
            }).slice(0, limit);
        }

        class ComputeTool {
            static get toolbox() { return { title: 'Compute Logic', icon: ICONS.compute }; }
            constructor({data, config, readOnly}) { this.config = config; this.readOnly = readOnly; this.data = { code: data.code || '', output: data.output || '' }; this.wrapper = createEl('div', 'compute-tool-container'); }
            render() {
                this.wrapper.innerHTML = '';
                this.input = createEl('textarea', 'compute-input', { placeholder: 'Type logic: 10 * 4 or groceries / 2...', value: this.data.code });
                if (this.readOnly) this.input.readOnly = true;
                this.output = createEl('div', 'compute-output', { innerHTML: this.data.output });
                const adjustHeight = () => { this.input.style.height = 'auto'; this.input.style.height = (this.input.scrollHeight) + 'px'; };
                setTimeout(adjustHeight, 0);

                let evalTimeout;
                this.input.addEventListener('input', (e) => { adjustHeight(); this.data.code = e.target.value; clearTimeout(evalTimeout); evalTimeout = setTimeout(() => this.evaluateLogic(), 400); });
                this.wrapper.append(this.input, this.output); return this.wrapper;
            }
            async evaluateLogic() {
                if (!this.data.code.trim()) { this.output.innerHTML = ''; this.data.output = ''; if(this.config.onChange) this.config.onChange(); return; }
                const find = (query) => {
                    let results = []; const q = query.toLowerCase();
                    Object.values(appDB.cache).forEach(day => {
                        if (!day.blocks) return;
                        day.blocks.forEach(b => {
                            if (b.type === 'compute' || b.type === 'recall') return; 
                            let text = JSON.stringify(b.data).toLowerCase();
                            if (text.includes(q)) {
                                if (b.data.text) results.push(b.data.text.replace(/<[^>]*>?/gm, ''));
                                else if (b.data.items) results.push(...b.data.items.map(i => getListItemText(i)));
                                else if (b.data.title) results.push(b.data.title);
                            }
                        });
                    });
                    return results;
                };
                const nums = (query) => { let texts = find(query); let numbers = []; texts.forEach(t => { let matches = t.match(/-?\d+(\.\d+)?/g); if (matches) numbers.push(...matches.map(Number)); }); return numbers; };
                const sum = (query) => nums(query).reduce((a,b)=>a+b, 0);
                const avg = (query) => { let n = nums(query); return n.length ? sum(query)/n.length : 0; };
                const min = (query) => { const values = Array.isArray(query) ? query.map(Number) : nums(query); return values.length ? Math.min(...values) : 0; };
                const max = (query) => { const values = Array.isArray(query) ? query.map(Number) : nums(query); return values.length ? Math.max(...values) : 0; };
                const count = (query) => Array.isArray(query) ? query.length : find(query).length;
                const ctx = {
                    sum,
                    avg,
                    nums,
                    find,
                    min,
                    max,
                    count,
                    abs: Math.abs,
                    ceil: Math.ceil,
                    floor: Math.floor,
                    round: Math.round,
                    sqrt: Math.sqrt,
                    pow: Math.pow,
                    log: Math.log,
                    exp: Math.exp,
                    now: () => Date.now(),
                    today: () => getLocalYYYYMMDD(new Date()),
                    Math
                };

                const tokenize = (source) => {
                    const tokens = [];
                    let index = 0;
                    while (index < source.length) {
                        const char = source[index];
                        if (/\s/.test(char)) { index += 1; continue; }
                        if ('()+-*/%,[].'.includes(char)) { tokens.push({ type: char, value: char }); index += 1; continue; }
                        if (char === '"' || char === "'") {
                            const quote = char;
                            let value = '';
                            index += 1;
                            while (index < source.length && source[index] !== quote) {
                                if (source[index] === '\\' && index + 1 < source.length) {
                                    value += source[index + 1];
                                    index += 2;
                                    continue;
                                }
                                value += source[index];
                                index += 1;
                            }
                            if (source[index] !== quote) throw new Error('Unterminated string literal');
                            index += 1;
                            tokens.push({ type: 'string', value });
                            continue;
                        }
                        const numberMatch = source.slice(index).match(/^\d+(\.\d+)?/);
                        if (numberMatch) {
                            tokens.push({ type: 'number', value: Number(numberMatch[0]) });
                            index += numberMatch[0].length;
                            continue;
                        }
                        const identifierMatch = source.slice(index).match(/^[A-Za-z_][A-Za-z0-9_]*/);
                        if (identifierMatch) {
                            tokens.push({ type: 'identifier', value: identifierMatch[0] });
                            index += identifierMatch[0].length;
                            continue;
                        }
                        throw new Error(`Unexpected token '${char}'`);
                    }
                    return tokens;
                };

                const parse = (tokens) => {
                    let position = 0;
                    const peek = () => tokens[position];
                    const match = (...types) => {
                        if (position >= tokens.length) return false;
                        if (!types.includes(tokens[position].type)) return false;
                        position += 1;
                        return true;
                    };
                    const consume = (type, message) => {
                        if (match(type)) return tokens[position - 1];
                        throw new Error(message);
                    };
                    const resolveIdentifier = (parts) => {
                        const fullPath = parts.join('.');
                        if (fullPath === 'Math.PI') return Math.PI;
                        if (fullPath === 'Math.E') return Math.E;
                        if (parts[0] === 'Math' && parts.length === 2) {
                            const value = Math[parts[1]];
                            if (typeof value === 'function') return value.bind(Math);
                            return value;
                        }
                        if (Object.prototype.hasOwnProperty.call(ctx, fullPath)) return ctx[fullPath];
                        if (parts.length === 1 && Object.prototype.hasOwnProperty.call(ctx, parts[0])) return ctx[parts[0]];
                        if (parts.length === 1) return sum(parts[0].toLowerCase());
                        throw new Error(`Unknown identifier '${fullPath}'`);
                    };
                    const parseExpression = () => parseAdditive();
                    const parseAdditive = () => {
                        let value = parseMultiplicative();
                        while (true) {
                            if (match('+')) value = value + parseMultiplicative();
                            else if (match('-')) value = value - parseMultiplicative();
                            else break;
                        }
                        return value;
                    };
                    const parseMultiplicative = () => {
                        let value = parseUnary();
                        while (true) {
                            if (match('*')) value = value * parseUnary();
                            else if (match('/')) value = value / parseUnary();
                            else if (match('%')) value = value % parseUnary();
                            else break;
                        }
                        return value;
                    };
                    const parseUnary = () => {
                        if (match('+')) return +parseUnary();
                        if (match('-')) return -parseUnary();
                        return parsePrimary();
                    };
                    const parseArgs = () => {
                        const args = [];
                        if (peek()?.type === ')') return args;
                        do { args.push(parseExpression()); } while (match(','));
                        return args;
                    };
                    const parsePrimary = () => {
                        if (match('number')) return tokens[position - 1].value;
                        if (match('string')) return tokens[position - 1].value;
                        if (match('(')) {
                            const value = parseExpression();
                            consume(')', 'Missing closing parenthesis');
                            return value;
                        }
                        if (match('[')) {
                            const items = [];
                            if (peek()?.type !== ']') {
                                do { items.push(parseExpression()); } while (match(','));
                            }
                            consume(']', 'Missing closing bracket');
                            return items;
                        }
                        if (match('identifier')) {
                            const parts = [tokens[position - 1].value];
                            while (match('.')) parts.push(consume('identifier', 'Expected identifier after dot').value);
                            const value = resolveIdentifier(parts);
                            if (match('(')) {
                                const args = parseArgs();
                                consume(')', 'Missing closing parenthesis after function call');
                                if (typeof value !== 'function') throw new Error(`'${parts.join('.')}' is not callable`);
                                return value(...args);
                            }
                            return value;
                        }
                        throw new Error('Expected number, string, identifier, array, or parenthesized expression');
                    };
                    const result = parseExpression();
                    if (position < tokens.length) throw new Error(`Unexpected token '${tokens[position].value}'`);
                    return result;
                };

                try {
                    const result = parse(tokenize(this.data.code));
                    if (result === undefined || result === null || Number.isNaN(result)) { this.output.innerHTML = ''; this.data.output = ''; } 
                    else if (Array.isArray(result) && result.length >= 2 && result.every(n => typeof n === 'number')) {
                        const min = Math.min(...result); const max = Math.max(...result); const range = (max - min) || 1;
                        const points = result.map((val, i) => `${(i / (result.length - 1)) * 100},${40 - ((val - min) / range) * 40}`).join(' ');
                        this.data.output = `<div style="font-size: 11px; color: var(--muted-text); margin-bottom: 4px;">Array: [${result.join(', ')}]</div><svg viewBox="0 -5 100 50" style="width: 100%; height: 60px; overflow: visible;" preserveAspectRatio="none"><polyline fill="none" stroke="var(--text-color)" stroke-width="2" points="${points}"></polyline></svg>`;
                        this.output.innerHTML = this.data.output; this.output.classList.remove('compute-error');
                    } else {
                        this.data.output = typeof result === 'object' ? escapeHTML(JSON.stringify(result)) : escapeHTML(String(result));
                        this.output.innerHTML = this.data.output; this.output.classList.remove('compute-error');
                    }
                } catch(e) { this.data.output = `<span class="compute-error">${escapeHTML(e.message)}</span>`; this.output.innerHTML = this.data.output; }
                if(this.config.onChange) this.config.onChange();
            }
            save() { return this.data; }
        }

        function parseMarkdownToEditorBlocks(markdown) {
            const blocksToInsert = [];
            const rawSections = String(markdown || '').split(/(?=\[COMPUTE\])|(?<=\[\/COMPUTE\])|\n\n/);

            rawSections.forEach(section => {
                const trimmed = section.trim();
                if (!trimmed) return;

                if (trimmed.startsWith('[COMPUTE]') && trimmed.endsWith('[/COMPUTE]')) {
                    blocksToInsert.push({ type: 'compute', data: { code: trimmed.replace('[COMPUTE]', '').replace('[/COMPUTE]', '').trim() } });
                    return;
                }

                const headerMatch = trimmed.match(/^(#{1,6})\s+(.*)/);
                if (headerMatch) {
                    blocksToInsert.push({ type: 'header', data: { text: headerMatch[2], level: Math.min(headerMatch[1].length, 3) } });
                    return;
                }

                if (trimmed.match(/^[-*]\s*\[[ xX]\]/)) {
                    const items = trimmed.split('\n').filter(line => line.trim()).map(line => ({
                        text: line.replace(/^[-*]\s*\[[ xX]\]\s*/, '').trim(),
                        checked: line.includes('[x]') || line.includes('[X]')
                    }));
                    blocksToInsert.push({ type: 'checklist', data: { items } });
                    return;
                }

                if (trimmed.startsWith('- ') || trimmed.startsWith('* ') || /^\d+\.\s/.test(trimmed)) {
                    const isOrdered = /^\d+\.\s/.test(trimmed);
                    const items = trimmed.split('\n').filter(line => line.trim()).map(line => ({
                        content: line.replace(/^[-*]\s|^\d+\.\s/, '').trim()
                    }));
                    blocksToInsert.push({ type: 'list', data: { style: isOrdered ? 'ordered' : 'unordered', items } });
                    return;
                }

                blocksToInsert.push({ type: 'paragraph', data: { text: trimmed.replace(/\n/g, '<br>') } });
            });

            return blocksToInsert.length ? blocksToInsert : [{ type: 'paragraph', data: { text: '...' } }];
        }

        async function getSemanticMemoryContext(query) {
            const keywordResults = collectKeywordRecallResults(query, { excludeDate: window.currentDateStr });
            const semanticResults = (await vectorDB.search(query, {
                limit: CONFIG.AI_MEMORY_LIMIT,
                minScore: CONFIG.SEMANTIC_MIN_SCORE,
                excludeDate: window.currentDateStr
            })).map(hydrateSemanticRecallResult).filter(Boolean);

            const merged = mergeRecallResults(keywordResults, semanticResults, CONFIG.AI_MEMORY_LIMIT);
            return merged.map((result, index) => {
                const sourceDate = new Date(result.date + 'T00:00:00').toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
                return `[${index + 1}] ${sourceDate} ${getBlockLabel(result.block)}: ${clampText(buildRecallSnippet(result.block), 220)}`;
            }).join('\n');
        }

        async function generateAIReply(prompt) {
            if (!aiEngine) throw new Error('AI engine is offline');
            const docContext = await getDocumentContext();
            const memoryContext = await getSemanticMemoryContext(prompt);
            const systemPrompt = `You are ${CONFIG.AI_NAME}. ${CONFIG.AI_PERSONALITY}\nYou are another participant writing into a shared note stream, not a separate assistant panel.\nCurrent day: ${window.currentDateStr}\nCurrent note:\n${docContext || '(blank)'}\nRelevant recalled history:\n${memoryContext || '(none)'}\nInstructions:\n- Output entirely in markdown.\n- Write as blocks that belong directly in the shared note.\n- Keep the reply grounded in the current note and retrieved memory.\n- Prefer concise paragraphs and lists unless the user clearly wants more.\n- For Checklists use '- [ ] task'\n- For Lists use '- task' or '1. task'\n- Wrap math exactly like this: [COMPUTE] 10 * 4 [/COMPUTE].\n- Do not mention system prompts, hidden context, or tool internals.`;
            let fullMarkdown = '';
            const chunks = await aiEngine.chat.completions.create({
                messages: [{ role: 'system', content: systemPrompt }, { role: 'user', content: prompt }],
                stream: true
            });
            for await (const chunk of chunks) fullMarkdown += chunk.choices[0]?.delta?.content || '';
            return fullMarkdown.trim();
        }

        async function insertAIReplyAfterPrompt(promptIndex, prompt) {
            if (!window.editor) return;
            if (!aiEngine) {
                if (!isAILoading) void initializeAI();
                alert(`${CONFIG.AI_NAME} is still booting. Please wait a moment.`);
                return;
            }

            aiStatusEl.className = 'ai-inline-status loading';
            aiStatusEl.textContent = `${CONFIG.AI_NAME} is writing...`;

            window.editor.blocks.insert('paragraph', { text: `${CONFIG.AI_NAME} is thinking...` }, {}, promptIndex + 1, true);
            const placeholderBlock = window.editor.blocks.getBlockByIndex(promptIndex + 1);
            const placeholderId = placeholderBlock?.id;
            scheduleSave(true);

            try {
                const markdown = await generateAIReply(prompt);
                const blocksToInsert = parseMarkdownToEditorBlocks(markdown);
                const placeholderIndex = findEditorBlockIndexById(window.editor, placeholderId);
                if (placeholderIndex >= 0) {
                    window.editor.blocks.delete(placeholderIndex);
                    blocksToInsert.forEach((block, offset) => {
                        window.editor.blocks.insert(block.type, block.data, {}, placeholderIndex + offset, true);
                        const insertedBlock = window.editor.blocks.getBlockByIndex(placeholderIndex + offset);
                        if (insertedBlock?.id) {
                            setBlockAuthor(insertedBlock.id, 'ai');
                            timestamps[insertedBlock.id] = Date.now() + offset;
                        }
                    });
                }
                aiStatusEl.className = 'ai-inline-status';
                aiStatusEl.textContent = 'online';
                scheduleSave(true);
            } catch (error) {
                const placeholderIndex = findEditorBlockIndexById(window.editor, placeholderId);
                if (placeholderIndex >= 0) {
                    window.editor.blocks.delete(placeholderIndex);
                    window.editor.blocks.insert('paragraph', { text: `${CONFIG.AI_NAME} hit an error: ${error.message}` }, {}, placeholderIndex, true);
                    const insertedBlock = window.editor.blocks.getBlockByIndex(placeholderIndex);
                    if (insertedBlock?.id) {
                        setBlockAuthor(insertedBlock.id, 'ai');
                        timestamps[insertedBlock.id] = Date.now();
                    }
                }
                aiStatusEl.className = 'ai-inline-status error';
                aiStatusEl.textContent = 'reply failed';
            }
        }

        class RecallTool {
            static get toolbox() { return { title: 'Recall', icon: ICONS.recall }; }
            constructor({data, config, api, readOnly}) { this.api = api; this.config = config; this.readOnly = readOnly; this.data = data && data.recalled ? data : { recalled: false, sourceDate: null, sourceTime: null, sourceBlock: null }; this.wrapper = createEl('div'); }
            render() {
                this.wrapper.innerHTML = '';
                if (this.data.recalled) { this.wrapper.appendChild(this.renderRecalledState()); } else if (!this.readOnly) { this.wrapper.appendChild(this.renderSearchState()); } else { this.wrapper.innerHTML = '<div style="color: var(--muted-text); font-size: 13px;">Empty Recall Block</div>'; }
                return this.wrapper;

                revokeObjectUrl(this.objectUrl);

                this.data.mediaId = mediaId;

            }

                this.nodes.button.className = 'v-memo__btn'; 
                if (this.isPlaying) { this.nodes.button.innerHTML = ICONS.pause; this.nodes.status.innerText = 'Playing...'; this.nodes.button.classList.add('playing'); }

        }

        let todayStr = getLocalYYYYMMDD(new Date());
        window.currentDateStr = todayStr;

        function setBlockAuthor(blockId, author) {
            if (!blockId || !author) return;
            blockAuthors[blockId] = author;
        }

        function getBlockAuthor(blockId) {
            return blockAuthors[blockId] || 'user';
        }

        function getDisplayDate(dateStr) {
            const [y, m, d] = dateStr.split('-'); const date = new Date(y, m - 1, d);
            return `${date.toLocaleDateString(undefined, { month: 'short', day: 'numeric' })}<br>${date.toLocaleDateString(undefined, { weekday: 'long' })}`; 
        }
        document.getElementById('date-header').innerHTML = getDisplayDate(window.currentDateStr);

        window.EDITOR_TOOLS_CONFIG = {
            paragraph: { class: Paragraph, inlineToolbar: ['link', 'bold', 'italic'] },
            header: { class: Header, inlineToolbar: ['link', 'bold', 'italic'], config: { levels: [1, 2, 3], defaultLevel: 2 } },
            list: { class: NestedList, inlineToolbar: ['link', 'bold', 'italic'] },
            checklist: { class: Checklist, inlineToolbar: ['link', 'bold', 'italic'] },
            scan: { class: ScanTool, config: { onChange: () => scheduleSave() } },
            compute: { class: ComputeTool, config: { onChange: () => scheduleSave() } },
            smartCanvas: { class: SmartCanvasTool, config: { onChange: () => scheduleSave() } },
            calendar: { class: CalendarTool, config: { onChange: () => scheduleSave() } },
            voice: { class: VoiceMemo, config: { onChange: () => scheduleSave() } },
            recall: { class: RecallTool, config: { onChange: () => scheduleSave() } }
        };

        const domObserver = new MutationObserver(() => { cancelAnimationFrame(updateRaf); updateRaf = requestAnimationFrame(updateAllTimestamps); });

        function updateAllTimestamps() {
            document.querySelectorAll('.ce-block').forEach(block => {
                const id = block.getAttribute('data-id'); if (!id) return;
                let timeEl = block.querySelector('.ce-block-time');
                if (!timeEl) { timeEl = createEl('div', 'ce-block-time'); block.appendChild(timeEl); }
                if (!blockAuthors[id] && window.currentDateStr === todayStr) setBlockAuthor(id, 'user');
                if (!timestamps[id] && window.currentDateStr === todayStr && window.editor) {
                    timestamps[id] = Date.now();
                    scheduleSave(); 
                }
                timeEl.innerHTML = '';
                timeEl.append(createEl('span', `ce-block-author ${getBlockAuthor(id) === 'ai' ? 'ai' : 'user'}`, { textContent: getAuthorLabel(getBlockAuthor(id)) }));
                if (timestamps[id]) timeEl.append(createEl('span', '', { textContent: new Date(timestamps[id]).toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' }) }));
            });
        }

        // --- Asynchronous Save Queue ---
        function executeSave() {
            if (!window.editor || window.currentDateStr !== todayStr) { isSaving = false; hasPendingSave = false; return; }
            
            isSaving = true;
            let savedSnapshot = null;
            window.editor.save().then(outputData => {
                outputData.timestamps = timestamps;
                outputData.authors = blockAuthors;
                savedSnapshot = outputData;
                return appDB.save(window.currentDateStr, outputData);
            }).then(() => {
                if (savedSnapshot) vectorDB.scheduleIndexDay(window.currentDateStr, savedSnapshot);
                const indicator = document.getElementById('save-indicator');
                if (indicator && !appDB.isMemoryOnly) {
                    indicator.classList.add('visible');
                    setTimeout(() => indicator.classList.remove('visible'), 1500);
                }
            }).catch(e => console.error("Editor core save failed:", e))
            .finally(() => {
                isSaving = false;
                if (hasPendingSave) { hasPendingSave = false; executeSave(); }
            });
        }

        function scheduleSave(immediate = false) {
            if (appDB.isMemoryOnly) return; // Don't churn memory if IDB is disabled
            clearTimeout(saveTimeout);
            if (immediate) {
                if (isSaving) hasPendingSave = true; else executeSave();
            } else {
                saveTimeout = setTimeout(() => { if (isSaving) hasPendingSave = true; else executeSave(); }, 800);
            }
        }

        // App lifecycle hooks for safety
        document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'hidden') scheduleSave(true); });
        window.addEventListener('pagehide', () => scheduleSave(true));
        
        document.getElementById('date-header').onclick = () => {
            scheduleSave(true);
            const [y, m, d] = window.currentDateStr.split('-').map(Number);
            DatePicker.open(new Date(y, m - 1, d), (selectedDate) => {
                const selectedStr = getLocalYYYYMMDD(selectedDate);
                if (window.currentDateStr !== selectedStr) {
                    window.currentDateStr = selectedStr;
                    document.getElementById('date-header').innerHTML = getDisplayDate(selectedStr);
                    initEditor(selectedStr);
                }
            }, { showTime: false, disableFuture: true, onlyNotes: true }); 
        };

        // ============================================================================
        // SEAMLESS AI INTERCEPTOR
        // ============================================================================
        document.getElementById('editorjs').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if (!window.editor) return;
                const activeIndex = window.editor.blocks.getCurrentBlockIndex();
                if (activeIndex === undefined || activeIndex < 0) return;
                
                const activeBlock = window.editor.blocks.getBlockByIndex(activeIndex);
                if (!activeBlock || activeBlock.name !== 'paragraph') return;
                
                const text = activeBlock.holder.textContent.replace(/\u00A0/g, ' ').trim(); 
                const trigger = `@${CONFIG.AI_NAME.toLowerCase()} `;

                if (text.toLowerCase().startsWith(trigger)) {
                    e.preventDefault(); e.stopPropagation();

                    const prompt = text.substring(trigger.length).trim();
                    if (!prompt) return;
                    void insertAIReplyAfterPrompt(activeIndex, prompt);
                }
            }
        }, true);

        // ============================================================================
        // EDITOR INITIALIZATION
        // ============================================================================
        async function initEditor(date) {
            if (window.editor) { 
                scheduleSave(true); 
                domObserver.disconnect(); 
                await window.editor.destroy(); 
                window.editor = null; 
            }
            
            const isToday = date === todayStr;
            let cachedData = appDB.cache[date];
            // Shallow clone structure, prevent direct array mutations on load
            let editorData = cachedData ? { blocks: [...cachedData.blocks], timestamps: {...cachedData.timestamps}, authors: {...cachedData.authors} } : { blocks: [] };
            
            if (isToday && (!editorData.blocks || editorData.blocks.length === 0)) {
                editorData = { blocks: [{ type: "paragraph", data: { text: `Type '@${CONFIG.AI_NAME} [prompt]' and hit Enter...` } }] };
            }

            timestamps = editorData.timestamps || {};
            blockAuthors = editorData.authors || {};
            document.getElementById('editorjs').innerHTML = '';

            window.editor = new EditorJS({
                holder: 'editorjs',
                placeholder: isToday ? `Start typing or call @${CONFIG.AI_NAME}...` : 'No notes available for this day.',
                readOnly: !isToday,
                data: editorData,
                tools: window.EDITOR_TOOLS_CONFIG,
                onChange: () => { if (isToday) scheduleSave(); },
                onReady: () => { domObserver.observe(document.getElementById('editorjs'), { childList: true, subtree: true }); updateAllTimestamps(); }
            });
        }

        // Initialize app, respecting private mode limitations
        Promise.all([appDB.init(), vectorDB.init(), mediaStore.init()]).then(() => {
            initEditor(window.currentDateStr);
            vectorDB.ensureBackfill(appDB.cache);
        });

    </script>
</body>
</html>
